<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Food Animals Combat Stills Gallery</title>
    <base href="../" />
    <link rel="icon" type="image/png" sizes="192x192" href="assets/favicon-192.png" />
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f5f1;
        --ink: #1f2724;
        --muted: #66716e;
        --line: #cdd4cf;
        --panel: #ffffff;
        --panel-alt: #eef2ef;
        --cozy: #ba7330;
        --horror: #0f7f87;
        --defeat: #8e4352;
        --special: #544aa4;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 1180px;
        background: var(--bg);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      header {
        position: sticky;
        top: 0;
        z-index: 5;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
        padding: 14px 18px;
        border-bottom: 1px solid var(--line);
        background: rgba(244, 245, 241, 0.96);
        backdrop-filter: blur(10px);
      }

      h1 {
        margin: 0;
        font-size: 21px;
        line-height: 1.15;
        font-weight: 850;
      }

      .subhead {
        margin-top: 3px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.35;
      }

      .tools {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      input[type="search"] {
        width: 260px;
        height: 34px;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 0 10px;
        background: #fffefa;
        color: var(--ink);
        font: 650 13px/1 Inter, sans-serif;
      }

      .summary {
        min-width: 210px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.3;
        text-align: right;
      }

      main {
        padding: 16px 18px 28px;
      }

      .table {
        display: grid;
        grid-template-columns: 184px 126px minmax(820px, 1fr);
        align-items: stretch;
        width: 100%;
        min-width: 1180px;
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
        background: var(--panel);
      }

      .head,
      .line-cell,
      .state-label,
      .state-cell {
        border-right: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
      }

      .head {
        position: sticky;
        top: 64px;
        z-index: 4;
        padding: 9px 10px;
        background: #e8ede9;
        color: #29312f;
        font-size: 12px;
        font-weight: 850;
        text-transform: uppercase;
      }

      .head:last-child,
      .state-cell:last-child {
        border-right: 0;
      }

      .line-cell {
        position: sticky;
        left: 0;
        z-index: 3;
        grid-row: span 4;
        display: flex;
        flex-direction: column;
        justify-content: center;
        min-height: 736px;
        padding: 12px;
        background: #fbfcf8;
      }

      .line-name {
        font-size: 14px;
        line-height: 1.18;
        font-weight: 850;
      }

      .line-meta {
        margin-top: 5px;
        color: var(--muted);
        font-size: 11px;
        line-height: 1.35;
      }

      .rarity {
        display: inline-block;
        width: fit-content;
        margin-top: 9px;
        padding: 3px 7px;
        border-radius: 999px;
        background: #edf1ed;
        color: #45514d;
        font-size: 10px;
        font-weight: 800;
        text-transform: uppercase;
      }

      .rarity.epic,
      .rarity.boss {
        background: #eeeaf9;
        color: var(--special);
      }

      .rarity.rare {
        background: #f3edf4;
        color: #874e8d;
      }

      .rarity.uncommon {
        background: #eaf3ec;
        color: #447b54;
      }

      .state-cell {
        display: flex;
        flex-wrap: wrap;
        gap: 9px;
        align-items: center;
        min-height: 184px;
        padding: 10px;
        background: var(--panel);
      }

      .state-label {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 184px;
        padding: 10px;
        background: #f8faf7;
        color: #303a36;
        font-size: 12px;
        font-weight: 900;
        line-height: 1.25;
        text-align: center;
        text-transform: uppercase;
      }

      .state-label.cozy {
        color: var(--cozy);
      }

      .state-label.horror {
        color: var(--horror);
      }

      .state-label.defeat {
        color: var(--defeat);
      }

      .state-cell.alt {
        background: var(--panel-alt);
      }

      .tile {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        align-items: center;
        min-width: 148px;
        min-height: 164px;
        padding: 8px;
        border: 1px solid rgba(31, 39, 36, 0.13);
        border-radius: 6px;
        background: #fffefa;
      }

      .tile.missing {
        justify-content: center;
        color: #8b928f;
        background: #f0f2ef;
        font-size: 11px;
        font-weight: 750;
      }

      .tile-label {
        width: 100%;
        color: #303a36;
        font-size: 11px;
        line-height: 1.2;
        font-weight: 800;
        text-align: center;
      }

      .tile-label span {
        display: block;
        color: var(--muted);
        font-size: 10px;
        font-weight: 650;
      }

      .stage {
        display: flex;
        align-items: flex-end;
        justify-content: center;
        min-width: 124px;
        min-height: 106px;
        margin: 7px 0;
        padding: 6px;
        border-radius: 5px;
        background-color: #48505d;
        background-image:
          linear-gradient(45deg, #5f6876 25%, transparent 25%),
          linear-gradient(-45deg, #5f6876 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, #5f6876 75%),
          linear-gradient(-45deg, transparent 75%, #5f6876 75%);
        background-position: 0 0, 0 8px, 8px -8px, -8px 0;
        background-size: 16px 16px;
      }

      canvas {
        display: block;
        flex: 0 0 auto;
        image-rendering: pixelated;
      }

      .metrics {
        width: 100%;
        color: #58625f;
        font-size: 10px;
        line-height: 1.25;
        text-align: center;
        white-space: nowrap;
      }

      .path {
        max-width: 132px;
        overflow: hidden;
        color: #7c8582;
        text-overflow: ellipsis;
      }

      .group-gap {
        grid-column: 1 / -1;
        padding: 8px 12px;
        border-bottom: 1px solid var(--line);
        background: #dde5df;
        color: #34413d;
        font-size: 12px;
        font-weight: 850;
        text-transform: uppercase;
      }

      mark {
        background: #ffe08a;
        color: inherit;
      }
    </style>
  </head>
  <body>
    <header>
      <div>
        <h1>Combat Stills Gallery</h1>
        <div class="subhead">Base battle draw sizes. One page pixel equals one game canvas pixel; idle breathing and attack motion are not applied.</div>
      </div>
      <div class="tools">
        <input id="search" type="search" autocomplete="off" placeholder="Filter cast..." />
        <div id="summary" class="summary">Loading sprites...</div>
      </div>
    </header>
    <main>
      <section id="gallery" class="table" aria-label="Combat stills gallery">
        <div class="head">Line</div>
        <div class="head">State</div>
        <div class="head">Forms at Battle Size</div>
      </section>
    </main>

    <script src="src/runtime-assets.js"></script>
    <script src="src/unit-data.js"></script>
    <script>
      (() => {
        "use strict";

        const LIVE_TARGET_MULTIPLIER = 2.9;
        const HORROR_PLATE_BATTLE_SCALE = 1.3;
        const HORROR_DEFEAT_STILL_SCALE = 1.3;
        const FINAL_BOSS_TYPE_ID = "cyber_brain_final_boss";
        const FINAL_BOSS_MINION_TYPE_ID = "brainstem_wire_minion";
        const GIRAFFE_BOSS_TYPE_ID = "banana_split_giraffe_boss";
        const RARITY_ORDER = ["common", "uncommon", "rare", "epic", "boss"];

        const data = window.FoodAnimalsUnitData;
        const assets = window.FoodAnimalsRuntimeAssets;
        const gallery = document.getElementById("gallery");
        const search = document.getElementById("search");
        const summary = document.getElementById("summary");
        const imageCache = new Map();
        const metricsCache = new Map();
        const rows = [];
        let renderedTiles = 0;
        let missingTiles = 0;

        if (!data || !assets) {
          summary.textContent = "Unit data failed to load.";
          return;
        }

        function entryFor(typeId) {
          return data.CATALOG.find((entry) => entry.id === typeId) || null;
        }

        function displayId(id) {
          return String(id || "")
            .replace(/_/g, " ")
            .replace(/\b\w/g, (letter) => letter.toUpperCase());
        }

        function basename(src) {
          const clean = String(src || "").split("?")[0];
          return clean.slice(clean.lastIndexOf("/") + 1);
        }

        function spriteFromEntry(entry, tier) {
          if (!entry) return null;
          if (typeof entry === "string") return entry;
          return entry[tier] || entry[Math.min(4, tier)] || entry[1] || null;
        }

        function liveSpriteSrc(typeId, tier, state) {
          const cozy = data.RUNTIME_SPRITES[typeId]?.[tier] || null;
          if (state === "cozy") return cozy;
          return data.REALITY_RUNTIME_SPRITES[typeId]?.[tier] || cozy;
        }

        function defeatSpriteSrc(typeId, tier, state) {
          const cozy = spriteFromEntry(data.DEFEAT_STILL_SPRITES[typeId], tier);
          if (state === "cozy") return cozy;
          return spriteFromEntry(data.REALITY_DEFEAT_STILL_SPRITES[typeId], tier) || cozy;
        }

        function unitOverrides(typeId) {
          if (typeId === FINAL_BOSS_TYPE_ID) {
            return { battleSpriteScale: 2, battleSpriteOffsetY: 28 };
          }
          if (typeId === FINAL_BOSS_MINION_TYPE_ID) {
            return { battleSpriteScale: 1.06, battleSpriteOffsetY: 4 };
          }
          if (typeId === GIRAFFE_BOSS_TYPE_ID) {
            return { battleSpriteScale: 1.7, battleSpriteOffsetY: -24, defeatStillScale: 1.45 };
          }
          return { battleSpriteScale: 1, battleSpriteOffsetY: 0 };
        }

        function liveRenderSize(typeId, tier, metrics, state) {
          const radius = 28 + Math.min(4, tier) * 4;
          const visualRadius = radius * (unitOverrides(typeId).battleSpriteScale || 1);
          const presentationScale = state === "horror" ? HORROR_PLATE_BATTLE_SCALE : 1;
          const targetMax = visualRadius * LIVE_TARGET_MULTIPLIER;
          const drawScale = targetMax / Math.max(metrics.w, metrics.h, 1);
          return {
            w: metrics.w * drawScale * presentationScale,
            h: metrics.h * drawScale * presentationScale,
            targetMax: targetMax * presentationScale,
          };
        }

        function defeatRenderSize(typeId, tier, metrics, state) {
          const radius = 28 + tier * 4;
          const overrides = unitOverrides(typeId);
          const visualRadius = radius * (overrides.battleSpriteScale || 1);
          const presentationScale = state === "horror"
            ? (overrides.defeatStillScale || HORROR_DEFEAT_STILL_SCALE)
            : (overrides.defeatStillScale || 1);
          const targetMax = Math.round(visualRadius * LIVE_TARGET_MULTIPLIER * presentationScale);
          const drawScale = targetMax / Math.max(metrics.w, metrics.h, 1);
          return {
            w: Math.round(metrics.w * drawScale),
            h: Math.round(metrics.h * drawScale),
            targetMax,
          };
        }

        function imageFor(src) {
          if (!src) return Promise.resolve(null);
          if (imageCache.has(src)) {
            const image = imageCache.get(src);
            if (assets.ready(image) || assets.failed(image)) return Promise.resolve(image);
            return new Promise((resolve) => {
              image.addEventListener("load", () => resolve(image), { once: true });
              image.addEventListener("error", () => resolve(image), { once: true });
            });
          }
          const image = new Image();
          image.decoding = "async";
          image.dataset.loadState = "loading";
          image.onload = () => {
            image.dataset.loadState = "loaded";
          };
          image.onerror = () => {
            image.dataset.loadState = "failed";
          };
          image.src = src;
          imageCache.set(src, image);
          if (image.complete) return Promise.resolve(image);
          return new Promise((resolve) => {
            image.addEventListener("load", () => resolve(image), { once: true });
            image.addEventListener("error", () => resolve(image), { once: true });
          });
        }

        function makeTileShell(label, src) {
          const tile = document.createElement("article");
          tile.className = "tile";
          const title = document.createElement("div");
          title.className = "tile-label";
          title.textContent = label.title;
          const subtitle = document.createElement("span");
          subtitle.textContent = label.subtitle;
          title.appendChild(subtitle);
          const stage = document.createElement("div");
          stage.className = "stage";
          const metrics = document.createElement("div");
          metrics.className = "metrics";
          const path = document.createElement("div");
          path.className = "path";
          path.textContent = basename(src);
          metrics.append("loading", path);
          tile.append(title, stage, metrics);
          return { tile, stage, metrics, path };
        }

        function makeMissingTile(label) {
          missingTiles += 1;
          const tile = document.createElement("article");
          tile.className = "tile missing";
          tile.textContent = label;
          return tile;
        }

        async function renderSpriteTile({ row, tier, state, mode }) {
          const src = mode === "live"
            ? liveSpriteSrc(row.id, tier, state)
            : defeatSpriteSrc(row.id, tier, state);
          const form = row.forms[tier - 1] || { name: `Tier ${tier}` };
          const stateLabel = `${state === "horror" ? "Horror" : "Cozy"} ${mode === "live" ? "combat" : "defeat"}`;
          if (!src) return makeMissingTile(`${form.short || form.name || `T${tier}`} missing`);

          const shell = makeTileShell({
            title: `T${tier} ${form.short || form.name || ""}`.trim(),
            subtitle: stateLabel,
          }, src);

          imageFor(src).then((image) => {
            if (!assets.ready(image)) {
              shell.tile.classList.add("missing");
              shell.stage.remove();
              shell.metrics.textContent = "failed to load";
              missingTiles += 1;
              updateSummary();
              return;
            }

            const alpha = assets.alphaMetrics(image, metricsCache);
            const size = mode === "live"
              ? liveRenderSize(row.id, tier, alpha, state)
              : defeatRenderSize(row.id, tier, alpha, state);
            const canvas = document.createElement("canvas");
            const drawW = Math.max(1, size.w);
            const drawH = Math.max(1, size.h);
            canvas.width = Math.ceil(drawW);
            canvas.height = Math.ceil(drawH);
            canvas.style.width = `${drawW.toFixed(2)}px`;
            canvas.style.height = `${drawH.toFixed(2)}px`;
            const ctx = canvas.getContext("2d");
            ctx.imageSmoothingEnabled = false;
            if (mode === "defeat") ctx.globalAlpha = 0.86;
            ctx.drawImage(image, alpha.x, alpha.y, alpha.w, alpha.h, 0, 0, drawW, drawH);
            shell.stage.replaceChildren(canvas);
            shell.metrics.firstChild.textContent = `${drawW.toFixed(1)} x ${drawH.toFixed(1)} px`;
            renderedTiles += 1;
            updateSummary();
          });

          return shell.tile;
        }

        function lineRow(row) {
          const line = document.createElement("div");
          line.className = "line-cell";
          const name = document.createElement("div");
          name.className = "line-name";
          name.textContent = row.name;
          const meta = document.createElement("div");
          meta.className = "line-meta";
          meta.textContent = `${row.forms.length} form${row.forms.length === 1 ? "" : "s"} · ${row.id}`;
          const rarity = document.createElement("div");
          rarity.className = `rarity ${row.rarity || "common"}`;
          rarity.textContent = row.rarity || "common";
          line.append(name, meta, rarity);
          return line;
        }

        function stateCell(row, state, mode) {
          const cell = document.createElement("div");
          cell.className = "state-cell";
          if (mode === "defeat") cell.classList.add("alt");
          row.tiers.forEach(async (tier) => {
            cell.appendChild(await renderSpriteTile({ row, tier, state, mode }));
          });
          return cell;
        }

        function stateLabel(state, mode) {
          const label = document.createElement("div");
          label.className = `state-label ${state} ${mode === "defeat" ? "defeat" : ""}`;
          label.textContent = `${state} ${mode === "live" ? "combat" : "defeat"}`;
          return label;
        }

        function groupLabel(label) {
          const el = document.createElement("div");
          el.className = "group-gap";
          el.textContent = label;
          return el;
        }

        function makeCatalogRows() {
          const catalogRows = data.CATALOG.map((entry) => ({
            id: entry.id,
            name: entry.name,
            rarity: entry.rarity || "common",
            forms: entry.forms || [{ name: entry.name, short: entry.short || entry.name }],
            tiers: Array.from({ length: Math.max(1, entry.forms?.length || 1) }, (_, index) => index + 1),
          }));
          const specialRows = [
            {
              id: GIRAFFE_BOSS_TYPE_ID,
              name: "Banana Split Giraffe",
              rarity: "boss",
              forms: [{ name: "Banana Split Giraffe", short: "Giraffe" }],
              tiers: [4],
            },
            {
              id: FINAL_BOSS_TYPE_ID,
              name: "Overmind Control Cortex",
              rarity: "boss",
              forms: [{ name: "Overmind Control Cortex", short: "Overmind" }],
              tiers: [4],
            },
            {
              id: FINAL_BOSS_MINION_TYPE_ID,
              name: "Brainstem Wire Drone",
              rarity: "boss",
              forms: [1, 2, 3, 4, 5].map((tier) => ({ name: `Wire Drone ${tier}`, short: `Drone ${tier}` })),
              tiers: [1, 2, 3, 4, 5],
            },
          ];
          return { catalogRows, specialRows };
        }

        function renderRows() {
          const { catalogRows, specialRows } = makeCatalogRows();
          const grouped = RARITY_ORDER.slice(0, -1).map((rarity) => ({
            label: `${rarity} food animals`,
            rows: catalogRows.filter((row) => row.rarity === rarity),
          })).filter((group) => group.rows.length);
          grouped.push({ label: "special encounters", rows: specialRows });

          grouped.forEach((group) => {
            gallery.appendChild(groupLabel(group.label));
            group.rows.forEach((row) => {
              rows.push({ row, elements: [] });
              const line = lineRow(row);
              const stateSpecs = [
                ["cozy", "live"],
                ["horror", "live"],
                ["cozy", "defeat"],
                ["horror", "defeat"],
              ];
              const cells = [line];
              cells.forEach((cell) => {
                cell.dataset.searchText = `${row.name} ${row.id} ${row.rarity} ${row.forms.map((form) => `${form.name} ${form.short || ""}`).join(" ")}`.toLowerCase();
                gallery.appendChild(cell);
              });
              stateSpecs.forEach(([state, mode]) => {
                const label = stateLabel(state, mode);
                const cell = stateCell(row, state, mode);
                [label, cell].forEach((element) => {
                  element.dataset.searchText = `${row.name} ${row.id} ${row.rarity} ${state} ${mode} ${row.forms.map((form) => `${form.name} ${form.short || ""}`).join(" ")}`.toLowerCase();
                  gallery.appendChild(element);
                  cells.push(element);
                });
              });
              rows[rows.length - 1].elements = cells;
            });
          });
          updateSummary();
        }

        function updateSummary() {
          const lineCount = rows.length;
          summary.textContent = `${lineCount} lines · ${renderedTiles} rendered · ${missingTiles} missing/failed`;
        }

        function applyFilter() {
          const needle = search.value.trim().toLowerCase();
          rows.forEach(({ elements }) => {
            const visible = !needle || elements.some((element) => element.dataset.searchText?.includes(needle));
            elements.forEach((element) => {
              element.style.display = visible ? "" : "none";
            });
          });
        }

        search.addEventListener("input", applyFilter);
        renderRows();
      })();
    </script>
  </body>
</html>
