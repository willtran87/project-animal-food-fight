<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Harvest Friends - Music Cycler</title>
    <base href="../" />
    <link rel="icon" type="image/png" sizes="192x192" href="assets/favicon-192.png" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #111313;
        --panel: rgba(19, 22, 20, 0.88);
        --panel-strong: rgba(8, 10, 12, 0.76);
        --line: rgba(255, 255, 255, 0.18);
        --text: #f4f0e7;
        --muted: #b9c0b5;
        --accent: #61d189;
        --accent-2: #ffcf5a;
        --danger: #ff6b6b;
        --focus: #7ad7ff;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-width: 320px;
        margin: 0;
        background:
          linear-gradient(90deg, rgba(17, 19, 19, 0.92), rgba(17, 19, 19, 0.72)),
          url("assets/backgrounds/war-future-market-v1-2048x1280.webp") center / cover fixed;
        color: var(--text);
      }

      button,
      input,
      select {
        font: inherit;
      }

      button {
        min-height: 42px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.08);
        color: var(--text);
        cursor: pointer;
      }

      button:hover,
      button:focus-visible,
      select:focus-visible,
      input:focus-visible {
        border-color: var(--focus);
        outline: 2px solid rgba(122, 215, 255, 0.35);
        outline-offset: 2px;
      }

      button.is-active,
      button.primary {
        border-color: rgba(97, 209, 137, 0.74);
        background: rgba(97, 209, 137, 0.18);
      }

      .page-shell {
        width: min(1160px, calc(100vw - 32px));
        min-height: 100vh;
        margin: 0 auto;
        padding: 28px 0;
        display: grid;
        grid-template-rows: auto 1fr;
        gap: 18px;
      }

      .top-bar {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 16px;
        align-items: end;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.7rem, 3vw, 3rem);
        line-height: 1;
        letter-spacing: 0;
      }

      .status-pill {
        min-width: 160px;
        padding: 10px 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel-strong);
        color: var(--muted);
        text-align: center;
      }

      .status-pill[data-state="playing"] {
        color: var(--accent);
      }

      .status-pill[data-state="blocked"],
      .status-pill[data-state="error"] {
        color: var(--danger);
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(300px, 420px) minmax(0, 1fr);
        gap: 18px;
        align-items: start;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 18px 70px rgba(0, 0, 0, 0.34);
      }

      .player-panel {
        position: sticky;
        top: 24px;
        padding: 18px;
      }

      .track-art {
        aspect-ratio: 16 / 10;
        border: 1px solid var(--line);
        border-radius: 8px;
        background:
          linear-gradient(180deg, rgba(0, 0, 0, 0.04), rgba(0, 0, 0, 0.46)),
          url("assets/backgrounds/picnic-arena-background-v1-2048x1280.webp") center / cover;
        overflow: hidden;
      }

      body[data-theme="horror"] .track-art {
        background:
          linear-gradient(180deg, rgba(0, 0, 0, 0.04), rgba(0, 0, 0, 0.54)),
          url("assets/backgrounds/war-future-market-v1-2048x1280.webp") center / cover;
      }

      .now-playing {
        margin: 16px 0;
      }

      .slot-label {
        margin: 0 0 8px;
        color: var(--accent-2);
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      .track-title {
        margin: 0;
        font-size: 1.55rem;
        line-height: 1.12;
      }

      .track-source {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 0.86rem;
        overflow-wrap: anywhere;
      }

      .transport-grid {
        display: grid;
        grid-template-columns: 1fr 1.3fr 1fr;
        gap: 10px;
      }

      .progress-row,
      .control-row,
      .select-row {
        display: grid;
        gap: 8px;
        margin-top: 16px;
      }

      .two-up {
        grid-template-columns: 1fr 1fr;
      }

      label {
        color: var(--muted);
        font-size: 0.82rem;
        font-weight: 700;
      }

      input[type="range"] {
        width: 100%;
        accent-color: var(--accent);
      }

      select,
      input[type="number"] {
        min-height: 40px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.08);
        color: var(--text);
      }

      select option {
        color: #111313;
      }

      .time-readout {
        display: flex;
        justify-content: space-between;
        color: var(--muted);
        font-variant-numeric: tabular-nums;
        font-size: 0.82rem;
      }

      .track-list {
        padding: 14px;
      }

      .list-tools {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(78px, 1fr));
        gap: 8px;
        margin-bottom: 12px;
      }

      .tracks {
        display: grid;
        gap: 8px;
      }

      .track-button {
        width: 100%;
        min-height: 58px;
        padding: 10px 12px;
        display: grid;
        grid-template-columns: auto minmax(0, 1fr) auto;
        gap: 12px;
        align-items: center;
        text-align: left;
      }

      .track-button:disabled {
        cursor: not-allowed;
        opacity: 0.54;
      }

      .track-index {
        width: 32px;
        color: var(--muted);
        font-variant-numeric: tabular-nums;
      }

      .track-meta {
        min-width: 0;
      }

      .track-meta strong,
      .track-meta span {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .track-meta span,
      .track-tag {
        color: var(--muted);
        font-size: 0.82rem;
      }

      .track-tag {
        padding: 5px 8px;
        border: 1px solid var(--line);
        border-radius: 999px;
        text-transform: capitalize;
      }

      .track-tag.is-v2 {
        border-color: rgba(255, 207, 90, 0.5);
        color: var(--accent-2);
      }

      .track-tag.is-v3 {
        border-color: rgba(122, 215, 255, 0.58);
        color: var(--focus);
      }

      @media (max-width: 780px) {
        .page-shell {
          width: min(100% - 20px, 1160px);
          padding: 16px 0;
        }

        .top-bar,
        .workspace {
          grid-template-columns: 1fr;
        }

        .player-panel {
          position: static;
        }
      }
    </style>
  </head>
  <body data-theme="cozy">
    <main class="page-shell">
      <header class="top-bar">
        <h1>Music Cycler</h1>
        <div class="status-pill" data-status data-state="idle">Idle</div>
      </header>

      <div class="workspace">
        <section class="panel player-panel" aria-label="Music player">
          <div class="track-art" aria-hidden="true"></div>
          <div class="now-playing">
            <p class="slot-label" data-slot>Menu - Cozy</p>
            <h2 class="track-title" data-title>Sunny Market</h2>
            <p class="track-source" data-source>assets/audio/cozy-market-menu-loop-v1.mp3</p>
          </div>

          <div class="transport-grid">
            <button type="button" data-action="prev" aria-label="Previous track">Prev</button>
            <button class="primary" type="button" data-action="play" aria-label="Play or pause">Play</button>
            <button type="button" data-action="next" aria-label="Next track">Next</button>
          </div>

          <div class="progress-row">
            <label for="music-seek">Position</label>
            <input id="music-seek" type="range" min="0" max="1000" value="0" />
            <div class="time-readout">
              <span data-current-time>0:00</span>
              <span data-duration>0:00</span>
            </div>
          </div>

          <div class="control-row two-up">
            <div>
              <label for="music-volume">Volume</label>
              <input id="music-volume" type="range" min="0" max="10" value="7" />
            </div>
            <div>
              <label for="cycle-seconds">Cycle Seconds</label>
              <input id="cycle-seconds" type="number" min="3" max="300" step="1" value="20" />
            </div>
          </div>

          <div class="transport-grid" style="margin-top: 16px">
            <button type="button" data-action="cycle">Cycle Off</button>
            <button type="button" data-action="restart">Restart</button>
            <button type="button" data-action="stop">Stop</button>
          </div>

          <div class="select-row">
            <label for="track-select">Track</label>
            <select id="track-select"></select>
          </div>
        </section>

        <section class="panel track-list" aria-label="Available music tracks">
          <div class="list-tools" role="group" aria-label="Track filters">
            <button class="is-active" type="button" data-filter="all">All</button>
            <button type="button" data-filter="original">Original</button>
            <button type="button" data-filter="v2">V2</button>
            <button type="button" data-filter="v3">V3</button>
            <button type="button" data-filter="cozy">Cozy</button>
            <button type="button" data-filter="horror">Horror</button>
          </div>
          <div class="tracks" data-tracks></div>
        </section>
      </div>
    </main>

    <script src="src/presentation-data.js"></script>
    <script src="src/audio-runtime.js"></script>
    <script>
      (() => {
        "use strict";

        const presentation = window.FoodAnimalsPresentationData || {};
        const audioRuntime = window.FoodAnimalsAudioRuntime || {};
        const GENERATED_MANIFESTS = [
          { src: "assets/audio/music-v2-manifest.json", version: "v2", error: "V2 Manifest Error" },
          { src: "assets/audio/music-v3-manifest.json", version: "v3", error: "V3 Manifest Error" },
        ];
        const trackGroups = presentation.GAME_MUSIC_TRACKS || {};
        let tracks = Object.entries(trackGroups).flatMap(([theme, slots]) =>
          Object.entries(slots).map(([slot, track]) => ({
            ...track,
            theme,
            slot,
            version: "original",
            available: true,
          })),
        );

        const runtime = { armed: false };
        const params = new URLSearchParams(window.location.search);
        const els = {
          body: document.body,
          status: document.querySelector("[data-status]"),
          slot: document.querySelector("[data-slot]"),
          title: document.querySelector("[data-title]"),
          source: document.querySelector("[data-source]"),
          play: document.querySelector('[data-action="play"]'),
          cycle: document.querySelector('[data-action="cycle"]'),
          volume: document.querySelector("#music-volume"),
          cycleSeconds: document.querySelector("#cycle-seconds"),
          seek: document.querySelector("#music-seek"),
          currentTime: document.querySelector("[data-current-time]"),
          duration: document.querySelector("[data-duration]"),
          select: document.querySelector("#track-select"),
          tracks: document.querySelector("[data-tracks]"),
          filters: Array.from(document.querySelectorAll("[data-filter]")),
        };

        let currentIndex = Math.max(
          0,
          tracks.findIndex((track) => track.id === params.get("track")),
        );
        if (!params.has("track") && params.has("theme")) {
          const themeIndex = tracks.findIndex((track) => track.theme === params.get("theme"));
          if (themeIndex >= 0) currentIndex = themeIndex;
        }
        const versionFilters = ["original", "v2", "v3"];
        const initialVersionFilter = versionFilters.includes(params.get("version")) ? params.get("version") : null;
        let filter = initialVersionFilter || (["cozy", "horror"].includes(params.get("theme")) ? params.get("theme") : "all");
        let isPlaying = false;
        let cycleEnabled = ["1", "true", "yes", "on"].includes(String(params.get("cycle")).toLowerCase());
        let cycleTimer = null;

        function selectedTrack() {
          return tracks[currentIndex] || null;
        }

        function formatTime(seconds) {
          if (!Number.isFinite(seconds) || seconds < 0) return "0:00";
          const mins = Math.floor(seconds / 60);
          const secs = Math.floor(seconds % 60);
          return `${mins}:${String(secs).padStart(2, "0")}`;
        }

        function volumeValue() {
          return Math.max(0, Math.min(1, Number(els.volume.value || 0) / 10));
        }

        function cycleMs() {
          return Math.max(3, Number(els.cycleSeconds.value || 20)) * 1000;
        }

        function setStatus(text, state = "idle") {
          els.status.textContent = text;
          els.status.dataset.state = state;
        }

        function updateUrl() {
          const next = new URL(window.location.href);
          const track = selectedTrack();
          if (track) next.searchParams.set("track", track.id);
          next.searchParams.delete("theme");
          next.searchParams.delete("version");
          if (["cozy", "horror"].includes(filter)) next.searchParams.set("theme", filter);
          if (versionFilters.includes(filter)) next.searchParams.set("version", filter);
          if (cycleEnabled) next.searchParams.set("cycle", "1");
          else next.searchParams.delete("cycle");
          window.history.replaceState(null, "", next);
        }

        function syncAudio() {
          const track = selectedTrack();
          if (!track || typeof audioRuntime.syncMusic !== "function") return;
          if (track.available === false) {
            isPlaying = false;
            setStatus("Pending", "blocked");
            return;
          }
          runtime.armed = isPlaying;
          audioRuntime.syncMusic(runtime, {
            track,
            volume: volumeValue(),
            armed: isPlaying,
            enabled: isPlaying,
            onStarted: () => {
              setStatus("Playing", "playing");
              updateControls();
            },
            onBlocked: () => {
              isPlaying = false;
              setStatus("Click Play", "blocked");
              updateControls();
            },
          });
        }

        function restartCycleTimer() {
          window.clearInterval(cycleTimer);
          cycleTimer = null;
          if (!cycleEnabled || !isPlaying) return;
          cycleTimer = window.setInterval(() => {
            selectTrack(currentIndex + 1, { play: true });
          }, cycleMs());
        }

        function updateProgress() {
          const audio = runtime.audio;
          if (!audio) return;
          const duration = Number.isFinite(audio.duration) ? audio.duration : 0;
          const current = Number.isFinite(audio.currentTime) ? audio.currentTime : 0;
          els.seek.value = duration > 0 ? String(Math.round((current / duration) * 1000)) : "0";
          els.currentTime.textContent = formatTime(current);
          els.duration.textContent = formatTime(duration);
        }

        function updateControls() {
          const track = selectedTrack();
          if (!track) return;
          els.body.dataset.theme = track.theme;
          els.slot.textContent = `${track.slot} - ${track.theme}`;
          els.title.textContent = track.label;
          els.source.textContent = track.src;
          els.play.textContent = isPlaying ? "Pause" : "Play";
          els.play.disabled = track.available === false;
          els.cycle.textContent = cycleEnabled ? "Cycle On" : "Cycle Off";
          els.cycle.classList.toggle("is-active", cycleEnabled);
          els.select.value = track.id;
          els.tracks.querySelectorAll("[data-track-id]").forEach((button) => {
            button.classList.toggle("is-active", button.dataset.trackId === track.id);
          });
          updateProgress();
        }

        function renderTrackList() {
          els.tracks.innerHTML = "";
          tracks
            .map((track, index) => ({ track, index }))
            .filter(({ track }) => filter === "all" || track.theme === filter || track.version === filter)
            .forEach(({ track, index }) => {
              const button = document.createElement("button");
              button.type = "button";
              button.className = "track-button";
              button.disabled = track.available === false;
              button.dataset.trackId = track.id;
              button.innerHTML = `
                <span class="track-index">${String(index + 1).padStart(2, "0")}</span>
                <span class="track-meta">
                  <strong></strong>
                  <span></span>
                </span>
                <span class="track-tag"></span>
              `;
              button.querySelector("strong").textContent = track.label;
              button.querySelector(".track-meta span").textContent =
                track.available === false ? `${track.slot} / pending generation` : track.slot;
              const tag = button.querySelector(".track-tag");
              tag.textContent = track.version === "original" ? track.theme : track.version;
              tag.classList.toggle("is-v2", track.version === "v2");
              tag.classList.toggle("is-v3", track.version === "v3");
              button.addEventListener("click", () => selectTrack(index, { play: isPlaying }));
              els.tracks.append(button);
            });

          els.filters.forEach((button) => {
            button.classList.toggle("is-active", button.dataset.filter === filter);
          });
          updateControls();
        }

        function selectTrack(index, options = {}) {
          if (!tracks.length) {
            setStatus("No Tracks", "error");
            return;
          }
          currentIndex = (index + tracks.length) % tracks.length;
          isPlaying = selectedTrack()?.available === false ? false : Boolean(options.play);
          syncAudio();
          updateUrl();
          updateControls();
          restartCycleTimer();
          if (!isPlaying) setStatus(selectedTrack()?.available === false ? "Pending" : "Ready", selectedTrack()?.available === false ? "blocked" : "idle");
        }

        function togglePlay() {
          isPlaying = !isPlaying;
          if (!isPlaying) {
            if (runtime.audio) runtime.audio.pause();
            setStatus("Paused", "idle");
          } else {
            setStatus("Starting", "idle");
            syncAudio();
          }
          updateControls();
          restartCycleTimer();
        }

        function stop() {
          isPlaying = false;
          if (typeof audioRuntime.pauseAll === "function") audioRuntime.pauseAll(runtime);
          if (runtime.audio) runtime.audio.currentTime = 0;
          setStatus("Stopped", "idle");
          updateControls();
          restartCycleTimer();
        }

        function buildSelect() {
          els.select.innerHTML = "";
          tracks.forEach((track) => {
            const option = document.createElement("option");
            option.value = track.id;
            option.disabled = track.available === false;
            option.textContent = `${track.theme} / ${track.version} / ${track.slot} / ${track.label}${track.available === false ? " (pending)" : ""}`;
            els.select.append(option);
          });
        }

        async function fetchAvailableTrackSrc(file) {
          const src = ["assets", "audio", file].join("/");
          try {
            const response = await fetch(src, { method: "HEAD", cache: "no-store" });
            return { src, available: response.ok };
          } catch (error) {
            return { src, available: false };
          }
        }

        async function loadGeneratedManifest(manifestInfo) {
          try {
            const response = await fetch(manifestInfo.src, { cache: "no-store" });
            if (!response.ok) return;
            const manifest = await response.json();
            const generatedTracks = await Promise.all(
              (manifest.tracks || []).map(async (track) => {
                const fileStatus = await fetchAvailableTrackSrc(track.file);
                return {
                  ...track,
                  ...fileStatus,
                  version: manifestInfo.version,
                };
              }),
            );
            tracks = [...tracks, ...generatedTracks];
          } catch (error) {
            setStatus(manifestInfo.error, "error");
          }
        }

        async function loadGeneratedTracks() {
          for (const manifestInfo of GENERATED_MANIFESTS) {
            await loadGeneratedManifest(manifestInfo);
          }
        }

        document.querySelector('[data-action="prev"]').addEventListener("click", () => {
          selectTrack(currentIndex - 1, { play: isPlaying });
        });
        document.querySelector('[data-action="next"]').addEventListener("click", () => {
          selectTrack(currentIndex + 1, { play: isPlaying });
        });
        els.play.addEventListener("click", togglePlay);
        document.querySelector('[data-action="restart"]').addEventListener("click", () => {
          if (runtime.audio) runtime.audio.currentTime = 0;
          selectTrack(currentIndex, { play: true });
        });
        document.querySelector('[data-action="stop"]').addEventListener("click", stop);
        els.cycle.addEventListener("click", () => {
          cycleEnabled = !cycleEnabled;
          updateUrl();
          updateControls();
          restartCycleTimer();
        });
        els.volume.addEventListener("input", syncAudio);
        els.cycleSeconds.addEventListener("change", restartCycleTimer);
        els.seek.addEventListener("input", () => {
          const audio = runtime.audio;
          if (!audio || !Number.isFinite(audio.duration)) return;
          audio.currentTime = (Number(els.seek.value) / 1000) * audio.duration;
          updateProgress();
          restartCycleTimer();
        });
        els.select.addEventListener("change", () => {
          const nextIndex = tracks.findIndex((track) => track.id === els.select.value);
          if (nextIndex >= 0) selectTrack(nextIndex, { play: isPlaying });
        });
        els.filters.forEach((button) => {
          button.addEventListener("click", () => {
            filter = button.dataset.filter;
            updateUrl();
            renderTrackList();
          });
        });
        document.addEventListener("keydown", (event) => {
          if (event.target && ["INPUT", "SELECT"].includes(event.target.tagName)) return;
          if (event.key === " ") {
            event.preventDefault();
            togglePlay();
          } else if (event.key === "ArrowLeft") {
            selectTrack(currentIndex - 1, { play: isPlaying });
          } else if (event.key === "ArrowRight") {
            selectTrack(currentIndex + 1, { play: isPlaying });
          }
        });
        window.setInterval(updateProgress, 250);

        window.render_music_test_to_text = () =>
          JSON.stringify({
            trackCount: tracks.length,
            currentIndex,
            filter,
            cycleEnabled,
            isPlaying,
            status: els.status.textContent,
            track: selectedTrack(),
            availableTracks: tracks.filter((track) => track.available !== false).length,
            pendingTracks: tracks.filter((track) => track.available === false).length,
            audio: runtime.audio
              ? {
                  paused: runtime.audio.paused,
                  currentTime: runtime.audio.currentTime,
                  duration: Number.isFinite(runtime.audio.duration) ? runtime.audio.duration : null,
                  volume: runtime.audio.volume,
                  loop: runtime.audio.loop,
                }
              : null,
          });

        loadGeneratedTracks().then(() => {
          currentIndex = Math.max(
            0,
            tracks.findIndex((track) => track.id === params.get("track")),
          );
          if (!params.has("track") && params.has("theme")) {
            const themeIndex = tracks.findIndex((track) => track.theme === params.get("theme"));
            if (themeIndex >= 0) currentIndex = themeIndex;
          }
          if (!params.has("track") && initialVersionFilter) {
            const versionIndex = tracks.findIndex((track) => track.version === initialVersionFilter);
            if (versionIndex >= 0) currentIndex = versionIndex;
          }
          buildSelect();
          renderTrackList();
          selectTrack(currentIndex, { play: false });
        });
      })();
    </script>
  </body>
</html>
