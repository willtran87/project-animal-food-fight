<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Food Animals Merge Cutscene Prototype</title>
    <base href="../" />
    <link rel="icon" type="image/png" sizes="192x192" href="assets/favicon-192.png" />
    <style>
      :root {
        color-scheme: dark;
        --ink: #f7efe2;
        --muted: #c9bda5;
        --panel: rgba(21, 22, 27, 0.84);
        --line: rgba(247, 239, 226, 0.18);
        --gold: #ffd36a;
        --mint: #9bf1c7;
        --red: #ff646e;
        --blue: #8ac7ff;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow-x: hidden;
        background:
          radial-gradient(circle at 18% 18%, rgba(255, 211, 106, 0.14), transparent 28%),
          radial-gradient(circle at 82% 20%, rgba(138, 199, 255, 0.16), transparent 30%),
          linear-gradient(145deg, #161116 0%, #20221d 45%, #11171c 100%);
        color: var(--ink);
      }

      body[data-reality="horror"] {
        background:
          radial-gradient(circle at 16% 18%, rgba(255, 70, 88, 0.2), transparent 28%),
          radial-gradient(circle at 76% 14%, rgba(65, 220, 255, 0.16), transparent 31%),
          linear-gradient(145deg, #090b0f 0%, #171115 48%, #071015 100%);
      }

      .page {
        width: min(1280px, calc(100vw - 32px));
        min-height: 100vh;
        margin: 0 auto;
        padding: 24px 0 28px;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        gap: 14px;
      }

      .topbar,
      .controls {
        border: 1px solid var(--line);
        background: var(--panel);
        backdrop-filter: blur(16px);
        box-shadow: 0 18px 70px rgba(0, 0, 0, 0.28);
      }

      .topbar {
        min-height: 74px;
        padding: 14px 16px;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 16px;
        align-items: center;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.2rem, 2vw, 1.9rem);
        line-height: 1;
        letter-spacing: 0;
      }

      .subtitle {
        margin-top: 7px;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .stage-wrap {
        min-height: 0;
        display: grid;
        place-items: center;
      }

      canvas {
        display: block;
        width: min(100%, calc((100vh - 206px) * 1.6));
        max-height: calc(100vh - 206px);
        aspect-ratio: 16 / 10;
        min-height: 360px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: #050608;
        box-shadow: 0 26px 110px rgba(0, 0, 0, 0.44);
      }

      .controls {
        padding: 12px;
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto auto;
        gap: 12px;
        align-items: center;
      }

      .button-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      button {
        min-height: 40px;
        border: 1px solid rgba(247, 239, 226, 0.2);
        border-radius: 6px;
        padding: 0 13px;
        background: rgba(255, 255, 255, 0.07);
        color: var(--ink);
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button:hover,
      button:focus-visible,
      button[data-active="true"] {
        outline: none;
        border-color: rgba(255, 211, 106, 0.72);
        background: rgba(255, 211, 106, 0.14);
      }

      .icon-button {
        width: 40px;
        min-width: 40px;
        padding: 0;
        font-size: 1.2rem;
        line-height: 1;
      }

      body[data-reality="horror"] button:hover,
      body[data-reality="horror"] button:focus-visible,
      body[data-reality="horror"] button[data-active="true"] {
        border-color: rgba(255, 100, 110, 0.82);
        background: rgba(255, 100, 110, 0.16);
      }

      .slider-block {
        min-width: 210px;
        display: grid;
        gap: 5px;
      }

      .slider-block label {
        color: var(--muted);
        font-size: 0.8rem;
        font-weight: 700;
        text-transform: uppercase;
      }

      input[type="range"] {
        width: 100%;
        accent-color: var(--gold);
      }

      .status {
        min-width: 185px;
        color: var(--muted);
        font-size: 0.86rem;
        text-align: right;
      }

      @media (max-width: 780px) {
        .page {
          width: min(100vw - 18px, 1280px);
          padding-top: 9px;
        }

        .topbar,
        .controls {
          grid-template-columns: 1fr;
        }

        canvas {
          width: 100%;
          min-height: 300px;
          max-height: none;
        }

        .status {
          text-align: left;
        }
      }
    </style>
  </head>
  <body data-reality="cozy">
    <main class="page">
      <header class="topbar">
        <div>
          <h1>Merge Cutscene Prototype</h1>
          <div class="subtitle">Three matching rewards line up, resonate, collapse into light, then reveal the next tier.</div>
        </div>
        <div class="button-row">
          <button id="replayButton" type="button">Replay</button>
          <button id="musicButton" type="button" data-active="false">Music</button>
          <button id="realityButton" type="button">Horror Variant</button>
          <button id="closeButton" class="icon-button" type="button" aria-label="Close prototype" title="Close prototype">×</button>
        </div>
      </header>

      <section class="stage-wrap" aria-label="Animated merge cutscene stage">
        <canvas id="mergeStage" width="1600" height="1000"></canvas>
      </section>

      <footer class="controls">
        <div class="button-row" id="demoButtons" aria-label="Prototype examples">
          <button type="button" data-demo="animal" data-active="true">Food Animal</button>
          <button type="button" data-demo="topping">Topping</button>
          <button type="button" data-demo="drink">Drink</button>
        </div>
        <div class="slider-block">
          <label for="dramaRange">Drama</label>
          <input id="dramaRange" type="range" min="0" max="100" value="78" />
        </div>
        <div class="status" id="statusText">Space replay, 1-3 switch, H variant</div>
      </footer>
    </main>

    <script>
      (() => {
        "use strict";

        const canvas = document.getElementById("mergeStage");
        const ctx = canvas.getContext("2d");
        const replayButton = document.getElementById("replayButton");
        const musicButton = document.getElementById("musicButton");
        const realityButton = document.getElementById("realityButton");
        const closeButton = document.getElementById("closeButton");
        const dramaRange = document.getElementById("dramaRange");
        const demoButtons = Array.from(document.querySelectorAll("[data-demo]"));
        const statusText = document.getElementById("statusText");

        const WIDTH = canvas.width;
        const HEIGHT = canvas.height;
        const CENTER_X = WIDTH / 2;
        const CENTER_Y = HEIGHT / 2 + 26;
        const DURATION = 7200;
        const MUSIC_PAYOFF_MS = 5600;
        const TAU = Math.PI * 2;
        const generatedAssets = {
          cozyBackground: "assets/ui/runtime/merge-cutscene-cozy-prep-lab-bg-v1.png",
          horrorBackground: "assets/ui/runtime/merge-cutscene-horror-dystopian-lab-bg-v1.png",
          cozyParticles: "assets/ui/runtime/merge-cutscene-cozy-particles-v1.png",
          horrorFxAtlas: "assets/ui/runtime/level10-cutscene-fx-atlas-v1.png",
          cozyTextFlourish: "assets/ui/runtime/merge-cutscene-cozy-text-flourish-v1.png",
          horrorTextFlourish: "assets/ui/runtime/merge-cutscene-horror-text-flourish-v1.png",
        };
        const mergeMusicAssets = {
          cozy: {
            suspense: "assets/audio/merge-cutscene-cozy-suspense-v1.wav",
            celebration: "assets/audio/merge-cutscene-cozy-celebration-v1.wav",
          },
          horror: {
            suspense: "assets/audio/merge-cutscene-horror-suspense-v1.wav",
            celebration: "assets/audio/merge-cutscene-horror-celebration-v1.wav",
          },
        };

        const demos = {
          animal: {
            kind: "Food Animal",
            name: "Berry Bat",
            result: "Bramble Bat",
            horrorName: "Micro Nightwing Drone",
            horrorResult: "Razorwing Interceptor",
            tierFrom: 1,
            tierTo: 2,
            copiesLabel: "3 Berry Bats",
            sourceScale: 1.26,
            resultScale: 1.18,
            horrorSourceScale: 1.55,
            horrorResultScale: 1.48,
            cozy: {
              sources: [
                "assets/sprites/runtime/berry-bat-v3/berry-bat_berry-bat_idle_SW_00.png",
                "assets/sprites/runtime/berry-bat-v3/berry-bat_berry-bat_idle_SW_00.png",
                "assets/sprites/runtime/berry-bat-v3/berry-bat_berry-bat_idle_SW_00.png",
              ],
              result: "assets/sprites/runtime/berry-bat-v3/berry-bat_bramble-bat_idle_SW_00.png",
            },
            horror: {
              sources: [
                "assets/sprites/runtime/war-machine-berry-bat-v1/berry_bat-nightwing-swarm-drone-mk1_idle_SW_00.png",
                "assets/sprites/runtime/war-machine-berry-bat-v1/berry_bat-nightwing-swarm-drone-mk1_idle_SW_00.png",
                "assets/sprites/runtime/war-machine-berry-bat-v1/berry_bat-nightwing-swarm-drone-mk1_idle_SW_00.png",
              ],
              result: "assets/sprites/runtime/war-machine-berry-bat-v1/berry_bat-nightwing-swarm-drone-mk2_idle_SW_00.png",
            },
          },
          topping: {
            kind: "Topping",
            name: "Basil Leaf",
            result: "Basil Bloom",
            horrorName: "Sensor Blade Array I",
            horrorResult: "Sensor Blade Array II",
            tierFrom: 1,
            tierTo: 2,
            copiesLabel: "3 Basil Leaves",
            cozy: {
              sources: [
                "assets/items/runtime/basil_leaf-sticker-v1-lv1.webp",
                "assets/items/runtime/basil_leaf-sticker-v1-lv1.webp",
                "assets/items/runtime/basil_leaf-sticker-v1-lv1.webp",
              ],
              result: "assets/items/runtime/basil_leaf-sticker-v1-lv2.webp",
            },
            horror: {
              sources: [
                "assets/items/runtime/sensor_blade_array-horror-evolution-v1-lv1.png",
                "assets/items/runtime/sensor_blade_array-horror-evolution-v1-lv1.png",
                "assets/items/runtime/sensor_blade_array-horror-evolution-v1-lv1.png",
              ],
              result: "assets/items/runtime/sensor_blade_array-horror-evolution-v1-lv2.png",
            },
          },
          drink: {
            kind: "Drink",
            name: "Berry Fizz",
            result: "Berry Fizz Float",
            horrorName: "Berry Shield Cell I",
            horrorResult: "Berry Shield Cell II",
            tierFrom: 1,
            tierTo: 2,
            copiesLabel: "3 Berry Fizzes",
            cozy: {
              sources: [
                "assets/items/runtime/berry_fizz-grand-v2-lv1.webp",
                "assets/items/runtime/berry_fizz-grand-v2-lv1.webp",
                "assets/items/runtime/berry_fizz-grand-v2-lv1.webp",
              ],
              result: "assets/items/runtime/berry_fizz-grand-v2-lv2.webp",
            },
            horror: {
              sources: [
                "assets/items/runtime/item-horror-power_ion_bastion_reactor_lv1_idle_SW_00.png",
                "assets/items/runtime/item-horror-power_ion_bastion_reactor_lv1_idle_SW_00.png",
                "assets/items/runtime/item-horror-power_ion_bastion_reactor_lv1_idle_SW_00.png",
              ],
              result: "assets/items/runtime/item-horror-power_ion_bastion_reactor_lv2_idle_SW_00.png",
            },
          },
        };

        const state = {
          demoKey: "animal",
          reality: "cozy",
          time: 0,
          idleTime: 0,
          drama: Number(dramaRange.value) / 100,
          running: true,
          assetsLoaded: false,
          phase: "lineup",
          flashCount: 0,
          lastFrameAt: performance.now(),
          imageErrors: [],
          particles: [],
          images: new Map(),
        };
        const audioState = {
          enabled: false,
          blocked: false,
          activeCue: "silent",
          activeSrc: null,
          elements: new Map(),
        };

        const rand = mulberry32(0x51a7babe);

        function mulberry32(seed) {
          let a = seed >>> 0;
          return () => {
            a += 0x6d2b79f5;
            let t = a;
            t = Math.imul(t ^ (t >>> 15), t | 1);
            t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
            return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
          };
        }

        function clamp(value, min, max) {
          return Math.max(min, Math.min(max, value));
        }

        function smoothstep(edge0, edge1, value) {
          const t = clamp((value - edge0) / (edge1 - edge0), 0, 1);
          return t * t * (3 - 2 * t);
        }

        function easeOutCubic(t) {
          return 1 - Math.pow(1 - clamp(t, 0, 1), 3);
        }

        function easeInOutSine(t) {
          return -(Math.cos(Math.PI * clamp(t, 0, 1)) - 1) / 2;
        }

        function currentDemo() {
          return demos[state.demoKey];
        }

        function currentAssets() {
          return currentDemo()[state.reality];
        }

        function displayCopy(demo = currentDemo()) {
          if (state.reality === "horror") {
            return {
              name: demo.horrorName || demo.name,
              result: demo.horrorResult || demo.result,
            };
          }
          return {
            name: demo.name,
            result: demo.result,
          };
        }

        function headerCopy() {
          if (state.reality === "horror") {
            return {
              title: "Protocol Surge",
            };
          }
          return {
            title: "Recipe Bloom",
          };
        }

        function phaseLabel(phase = state.phase) {
          const labels = state.reality === "horror"
            ? {
                lineup: "Locked",
                resonance: "Signal",
                merge: "Collapse",
                silhouette: "Assembly",
                reveal: "Ignition",
                settle: "Online",
              }
            : {
                lineup: "Gathered",
                resonance: "Warming",
                merge: "Fold",
                silhouette: "Rising",
                reveal: "Bloom",
                settle: "Plated",
              };
          return labels[phase] || phase;
        }

        function drawFittedText(text, x, y, maxWidth, options = {}) {
          const weight = options.weight || 800;
          const maxSize = options.maxSize || 42;
          const minSize = options.minSize || 18;
          const family = options.family || "Inter, sans-serif";
          let size = maxSize;
          const previousBaseline = ctx.textBaseline;
          ctx.textBaseline = "alphabetic";
          do {
            ctx.font = `${weight} ${size}px ${family}`;
            if (ctx.measureText(text).width <= maxWidth || size <= minSize) break;
            size -= 1;
          } while (size >= minSize);
          const metrics = ctx.measureText(text);
          const visualCenterOffsetX = options.visualCenter
            ? (metrics.actualBoundingBoxRight - metrics.actualBoundingBoxLeft) / 2
            : 0;
          const visualBaseline = y + (metrics.actualBoundingBoxAscent - metrics.actualBoundingBoxDescent) / 2;
          ctx.fillText(text, x - visualCenterOffsetX, visualBaseline);
          ctx.textBaseline = previousBaseline;
          return size;
        }

        function wrapText(text, maxWidth, font) {
          ctx.font = font;
          const words = text.split(" ");
          const lines = [];
          let line = "";
          words.forEach((word) => {
            const candidate = line ? `${line} ${word}` : word;
            if (ctx.measureText(candidate).width <= maxWidth || !line) {
              line = candidate;
              return;
            }
            lines.push(line);
            line = word;
          });
          if (line) lines.push(line);
          return lines;
        }

        function drawFittedTextBlock(text, x, y, maxWidth, options = {}) {
          const weight = options.weight || 800;
          const maxSize = options.maxSize || 42;
          const minSize = options.minSize || 18;
          const maxLines = options.maxLines || 2;
          const family = options.family || "Inter, sans-serif";
          const lineHeightRatio = options.lineHeightRatio || 0.95;
          const previousBaseline = ctx.textBaseline;

          for (let size = maxSize; size >= minSize; size -= 1) {
            const font = `${weight} ${size}px ${family}`;
            const directWidth = (() => {
              ctx.font = font;
              return ctx.measureText(text).width;
            })();
            const lines = directWidth <= maxWidth ? [text] : wrapText(text, maxWidth, font);
            if (lines.length <= maxLines && lines.every((line) => ctx.measureText(line).width <= maxWidth)) {
              const lineHeight = size * lineHeightRatio;
              const top = y - ((lines.length - 1) * lineHeight) / 2;
              ctx.font = font;
              ctx.textBaseline = "middle";
              lines.forEach((line, index) => {
                ctx.fillText(line, x, top + index * lineHeight);
              });
              ctx.textBaseline = previousBaseline;
              return { size, lines };
            }
          }

          ctx.font = `${weight} ${minSize}px ${family}`;
          ctx.textBaseline = "middle";
          ctx.fillText(text, x, y);
          ctx.textBaseline = previousBaseline;
          return { size: minSize, lines: [text] };
        }

        function imageFor(src) {
          return state.images.get(src);
        }

        function currentTextFlourish() {
          return imageFor(state.reality === "horror" ? generatedAssets.horrorTextFlourish : generatedAssets.cozyTextFlourish);
        }

        function textFlourishReady() {
          const img = currentTextFlourish();
          return Boolean(img && img.complete && img.naturalWidth > 0);
        }

        function musicCueForTime(time = state.time) {
          return time >= MUSIC_PAYOFF_MS ? "celebration" : "suspense";
        }

        function musicSrc(cue = musicCueForTime(), reality = state.reality) {
          return mergeMusicAssets[reality]?.[cue] || null;
        }

        function ensureMusicElement(src, cue) {
          if (!src) return null;
          if (!audioState.elements.has(src)) {
            const audio = new Audio(src);
            audio.preload = "auto";
            audio.volume = 0;
            audioState.elements.set(src, audio);
          }
          const audio = audioState.elements.get(src);
          audio.loop = cue === "suspense";
          return audio;
        }

        function primeMusicElements(skipSrc = null) {
          Object.values(mergeMusicAssets).forEach((cues) => {
            Object.entries(cues).forEach(([cue, src]) => {
              if (src === skipSrc) return;
              const audio = ensureMusicElement(src, cue);
              if (!audio) return;
              audio.muted = true;
              audio.volume = 0;
              const playPromise = audio.play();
              if (playPromise) {
                playPromise
                  .then(() => {
                    audio.pause();
                    audio.currentTime = 0;
                    audio.muted = false;
                  })
                  .catch(() => {
                    audio.muted = false;
                  });
              } else {
                audio.pause();
                audio.currentTime = 0;
                audio.muted = false;
              }
            });
          });
        }

        function stopMusicElement(audio) {
          if (!audio) return;
          audio.pause();
          audio.currentTime = 0;
          audio.volume = 0;
        }

        function stopAllMusic() {
          audioState.elements.forEach(stopMusicElement);
          audioState.activeCue = "silent";
          audioState.activeSrc = null;
        }

        function updateMusicButton() {
          musicButton.dataset.active = String(audioState.enabled);
          musicButton.textContent = audioState.enabled ? "Music On" : "Music";
        }

        function playMusicCue(cue = musicCueForTime(), options = {}) {
          if (!audioState.enabled) return;
          const src = musicSrc(cue);
          if (!src) return;
          if (!options.restart && audioState.activeSrc === src && audioState.activeCue === cue) return;

          const previous = audioState.activeSrc ? audioState.elements.get(audioState.activeSrc) : null;
          if (previous) stopMusicElement(previous);

          const audio = ensureMusicElement(src, cue);
          if (!audio) return;
          const isPayoff = cue === "celebration";
          audio.volume = state.reality === "horror" ? (isPayoff ? 0.82 : 0.48) : (isPayoff ? 0.74 : 0.42);
          audio.currentTime = 0;
          audioState.activeCue = cue;
          audioState.activeSrc = src;
          audioState.blocked = false;
          const playPromise = audio.play();
          if (playPromise) {
            playPromise.catch(() => {
              audioState.blocked = true;
              audioState.activeCue = "blocked";
            });
          }
        }

        function syncMusicToPhase(options = {}) {
          if (!audioState.enabled) return;
          playMusicCue(musicCueForTime(), options);
        }

        function toggleMusic() {
          audioState.enabled = !audioState.enabled;
          updateMusicButton();
          if (audioState.enabled) {
            playMusicCue(musicCueForTime(), { restart: true });
            primeMusicElements(audioState.activeSrc);
          } else {
            stopAllMusic();
          }
        }

        function collectImagePaths() {
          const paths = new Set();
          paths.add(generatedAssets.cozyBackground);
          paths.add(generatedAssets.horrorBackground);
          paths.add(generatedAssets.cozyParticles);
          paths.add(generatedAssets.horrorFxAtlas);
          paths.add(generatedAssets.cozyTextFlourish);
          paths.add(generatedAssets.horrorTextFlourish);
          Object.values(demos).forEach((demo) => {
            ["cozy", "horror"].forEach((reality) => {
              demo[reality].sources.forEach((src) => paths.add(src));
              paths.add(demo[reality].result);
            });
          });
          return Array.from(paths);
        }

        function preload() {
          const paths = collectImagePaths();
          let remaining = paths.length;
          paths.forEach((src) => {
            const img = new Image();
            img.onload = () => {
              remaining -= 1;
              if (remaining === 0) {
                state.assetsLoaded = true;
                render();
              }
            };
            img.onerror = () => {
              state.imageErrors.push(src);
              remaining -= 1;
              if (remaining === 0) {
                state.assetsLoaded = true;
                render();
              }
            };
            img.src = src;
            state.images.set(src, img);
          });
        }

        function setDemo(key) {
          if (!demos[key]) return;
          state.demoKey = key;
          demoButtons.forEach((button) => {
            button.dataset.active = String(button.dataset.demo === key);
          });
          restart();
        }

        function toggleReality() {
          state.reality = state.reality === "cozy" ? "horror" : "cozy";
          document.body.dataset.reality = state.reality;
          realityButton.textContent = state.reality === "cozy" ? "Horror Variant" : "Cozy Variant";
          restart();
        }

        function restart() {
          state.time = 0;
          state.idleTime = 0;
          state.running = true;
          state.flashCount = 0;
          state.particles = [];
          state.phase = "lineup";
          spawnParticles(26, CENTER_X, CENTER_Y, 120, "dust");
          syncMusicToPhase({ restart: true });
          render();
        }

        function phaseFor(time) {
          if (time < 1000) return "lineup";
          if (time < 2600) return "resonance";
          if (time < 4300) return "merge";
          if (time < 5750) return "silhouette";
          if (time < 6500) return "reveal";
          return "settle";
        }

        function resultBreathValue() {
          const breatheAmount = smoothstep(6500, DURATION, state.time);
          const breathTime = Math.max(0, state.time - 6500 + state.idleTime);
          return Math.sin((breathTime * TAU) / 2600) * breatheAmount;
        }

        function update(dt) {
          if (!state.running) {
            state.idleTime += dt;
            return;
          }
          const previousPhase = state.phase;
          const previousTime = state.time;
          state.time = Math.min(DURATION, state.time + dt);
          state.phase = phaseFor(state.time);

          if (previousPhase !== state.phase) {
            if (state.phase === "merge") spawnParticles(76, CENTER_X, CENTER_Y, 310, "spark");
            if (state.phase === "silhouette") spawnParticles(96, CENTER_X, CENTER_Y, 440, "shard");
            if (state.phase === "reveal") {
              state.flashCount += 1;
              spawnParticles(150, CENTER_X, CENTER_Y, 570, "burst");
            }
            syncMusicToPhase();
          }
          if (previousTime < MUSIC_PAYOFF_MS && state.time >= MUSIC_PAYOFF_MS) {
            syncMusicToPhase({ restart: true });
          }

          if (state.phase === "resonance" && Math.floor(state.time / 180) % 3 === 0) {
            spawnParticles(1, CENTER_X + (rand() - 0.5) * 680, CENTER_Y + (rand() - 0.5) * 250, 90, "dust");
          }

          state.particles.forEach((particle) => {
            particle.age += dt;
            particle.x += particle.vx * (dt / 1000);
            particle.y += particle.vy * (dt / 1000);
            particle.vx *= Math.pow(0.86, dt / 100);
            particle.vy *= Math.pow(0.86, dt / 100);
          });
          state.particles = state.particles.filter((particle) => particle.age < particle.life);

          if (state.time >= DURATION) {
            state.running = false;
          }
        }

        function spawnParticles(count, x, y, power, kind) {
          const dramaBoost = 0.65 + state.drama * 0.7;
          for (let i = 0; i < count; i += 1) {
            const angle = rand() * TAU;
            const speed = (0.22 + rand() * 0.95) * power * dramaBoost;
            const palette =
              state.reality === "horror"
                ? ["#ff646e", "#8fe6ff", "#f6f7ff", "#7cffb0"]
                : ["#ffd36a", "#9bf1c7", "#fff7d0", "#8ac7ff"];
            state.particles.push({
              x: x + (rand() - 0.5) * 34,
              y: y + (rand() - 0.5) * 34,
              vx: Math.cos(angle) * speed,
              vy: Math.sin(angle) * speed - rand() * power * 0.18,
              r: kind === "dust" ? 2 + rand() * 5 : 3 + rand() * 8,
              age: 0,
              life: kind === "burst" ? 1200 + rand() * 900 : 700 + rand() * 900,
              color: palette[Math.floor(rand() * palette.length)],
              kind,
            });
          }
        }

        function clearStage() {
          const grd = ctx.createLinearGradient(0, 0, WIDTH, HEIGHT);
          if (state.reality === "horror") {
            grd.addColorStop(0, "#07090e");
            grd.addColorStop(0.52, "#170f14");
            grd.addColorStop(1, "#07141a");
          } else {
            grd.addColorStop(0, "#171118");
            grd.addColorStop(0.52, "#24241b");
            grd.addColorStop(1, "#111d22");
          }
          ctx.fillStyle = grd;
          ctx.fillRect(0, 0, WIDTH, HEIGHT);

          const background = imageFor(
            state.reality === "horror" ? generatedAssets.horrorBackground : generatedAssets.cozyBackground,
          );
          if (background && background.complete && background.naturalWidth > 0) {
            drawCoverImage(background, 0, 0, WIDTH, HEIGHT);
            ctx.save();
            ctx.globalCompositeOperation = state.reality === "horror" ? "multiply" : "source-over";
            ctx.fillStyle = state.reality === "horror" ? "rgba(42, 4, 10, 0.32)" : "rgba(32, 21, 9, 0.06)";
            ctx.fillRect(0, 0, WIDTH, HEIGHT);
            ctx.restore();
          } else {
            ctx.save();
            ctx.globalAlpha = state.reality === "horror" ? 0.2 : 0.16;
            ctx.strokeStyle = state.reality === "horror" ? "#ff646e" : "#ffd36a";
            ctx.lineWidth = 1;
            for (let x = -40; x < WIDTH + 80; x += 64) {
              ctx.beginPath();
              ctx.moveTo(x, 0);
              ctx.lineTo(x - 220, HEIGHT);
              ctx.stroke();
            }
            ctx.restore();
          }

          drawVignette(0.52 + state.drama * 0.18);
        }

        function drawCoverImage(img, x, y, w, h) {
          const scale = Math.max(w / img.naturalWidth, h / img.naturalHeight);
          const drawW = img.naturalWidth * scale;
          const drawH = img.naturalHeight * scale;
          ctx.drawImage(img, x + (w - drawW) / 2, y + (h - drawH) / 2, drawW, drawH);
        }

        function drawVignette(alpha) {
          const gradient = ctx.createRadialGradient(CENTER_X, CENTER_Y, 120, CENTER_X, CENTER_Y, 900);
          gradient.addColorStop(0, "rgba(0,0,0,0)");
          gradient.addColorStop(0.62, "rgba(0,0,0,0.26)");
          gradient.addColorStop(1, `rgba(0,0,0,${alpha})`);
          ctx.fillStyle = gradient;
          ctx.fillRect(0, 0, WIDTH, HEIGHT);
        }

        function drawStageFloor() {
          ctx.save();
          ctx.translate(CENTER_X, CENTER_Y + 230);
          ctx.scale(1, 0.28);
          const gradient = ctx.createRadialGradient(0, 0, 40, 0, 0, 560);
          gradient.addColorStop(0, state.reality === "horror" ? "rgba(255,100,110,0.36)" : "rgba(255,211,106,0.32)");
          gradient.addColorStop(0.45, state.reality === "horror" ? "rgba(138,199,255,0.11)" : "rgba(155,241,199,0.12)");
          gradient.addColorStop(1, "rgba(0,0,0,0)");
          ctx.fillStyle = gradient;
          ctx.beginPath();
          ctx.arc(0, 0, 560, 0, TAU);
          ctx.fill();
          ctx.restore();
        }

        function drawEnvironmentFx() {
          if (state.reality === "horror") {
            drawHorrorEnvironmentFx();
            return;
          }
          const cozyParticles = imageFor(generatedAssets.cozyParticles);
          if (!cozyParticles || !cozyParticles.complete || cozyParticles.naturalWidth === 0) return;
          const charge = smoothstep(750, 4400, state.time);
          const reveal = smoothstep(4200, 6300, state.time);
          const fade = 1 - smoothstep(6650, 7200, state.time);
          const pulse = Math.sin(state.time * 0.011) * 0.5 + 0.5;
          const alpha = (0.14 + charge * 0.2 + reveal * 0.12 + pulse * 0.07 * state.drama) * fade;
          const size = 760 + charge * 95 + pulse * 40;
          ctx.save();
          ctx.translate(CENTER_X, CENTER_Y + 28);
          ctx.rotate(state.time * 0.00008);
          ctx.globalAlpha = alpha;
          ctx.globalCompositeOperation = "screen";
          ctx.drawImage(
            cozyParticles,
            -size / 2,
            -size / 2,
            size,
            size * (cozyParticles.naturalHeight / cozyParticles.naturalWidth),
          );
          ctx.restore();
        }

        function drawHorrorEnvironmentFx() {
          const atlas = imageFor(generatedAssets.horrorFxAtlas);
          if (!atlas || !atlas.complete || atlas.naturalWidth === 0) return;
          const charge = smoothstep(900, 4550, state.time);
          const reveal = smoothstep(4200, 6300, state.time);
          const fade = 1 - smoothstep(6650, 7200, state.time);
          const pulse = Math.sin(state.time * 0.013) * 0.5 + 0.5;
          const collapse = smoothstep(2350, 4700, state.time) * (1 - smoothstep(6000, 6900, state.time));
          const alarm = smoothstep(3300, 5600, state.time) * (1 - smoothstep(6500, 7200, state.time));
          const amount = (0.18 + charge * 0.3 + reveal * 0.12 + pulse * 0.1 * state.drama) * fade;

          drawHorrorContainmentRings(charge, collapse, alarm, fade);
          drawHorrorScanSweep(charge, collapse, fade);

          ctx.save();
          ctx.globalCompositeOperation = "screen";
          ctx.globalAlpha = amount * 0.44;
          drawAtlasCell(atlas, 0, 0, 520, 330, CENTER_X - 348, CENTER_Y - 116, 600, 380, 0.05);
          ctx.globalAlpha = amount * 0.3;
          drawAtlasCell(atlas, 0, 0, 520, 330, CENTER_X + 30, CENTER_Y - 146, 360, 230, -0.08);
          ctx.globalAlpha = amount * (0.4 + alarm * 0.2);
          drawAtlasCell(atlas, 520, 0, 520, 330, CENTER_X - 128, CENTER_Y - 185, 370, 250, -0.04);
          ctx.globalAlpha = amount * (0.25 + alarm * 0.22);
          drawAtlasCell(atlas, 1040, 0, 520, 330, CENTER_X - 292, CENTER_Y - 235, 610, 245, 0);
          ctx.globalAlpha = amount * (0.22 + alarm * 0.16);
          drawAtlasCell(atlas, 1040, 660, 520, 330, CENTER_X - 450, CENTER_Y - 230, 930, 390, 0);
          ctx.restore();

          drawHorrorWarningNodes(charge, collapse, alarm, fade);
          drawHorrorSparkNeedles(collapse, alarm, fade);
        }

        function drawAtlasCell(atlas, sx, sy, sw, sh, x, y, w, h, rotation) {
          ctx.save();
          ctx.translate(x + w / 2, y + h / 2);
          ctx.rotate(rotation || 0);
          ctx.drawImage(atlas, sx, sy, sw, sh, -w / 2, -h / 2, w, h);
          ctx.restore();
        }

        function drawHorrorContainmentRings(charge, collapse, alarm, fade) {
          const intensity = (0.18 + charge * 0.34 + collapse * 0.28 + alarm * 0.18) * fade;
          if (intensity <= 0.01) return;
          const floorY = CENTER_Y + 88;
          const scan = state.time * 0.0018;
          ctx.save();
          ctx.translate(CENTER_X, floorY);
          ctx.scale(1, 0.34);
          ctx.globalCompositeOperation = "screen";
          for (let i = 0; i < 6; i += 1) {
            const radius = 125 + i * 47 + Math.sin(state.time * 0.006 + i) * (8 + collapse * 10);
            ctx.setLineDash(i % 2 === 0 ? [34, 16, 6, 14] : [12, 18]);
            ctx.lineDashOffset = -(state.time * (0.045 + i * 0.012));
            ctx.lineWidth = i < 2 ? 3.2 : 2;
            ctx.strokeStyle = i % 2 === 0
              ? `rgba(123, 240, 255, ${intensity * (0.24 + collapse * 0.16)})`
              : `rgba(255, 76, 88, ${intensity * (0.22 + alarm * 0.2)})`;
            ctx.beginPath();
            ctx.arc(0, 0, radius, 0, TAU);
            ctx.stroke();
          }
          ctx.setLineDash([]);
          for (let i = 0; i < 18; i += 1) {
            const a = i / 18 * TAU + scan;
            const inner = 182 + Math.sin(state.time * 0.005 + i) * 8;
            const outer = 292 + collapse * 58;
            ctx.globalAlpha = intensity * (0.34 + (i % 3 === 0 ? alarm * 0.34 : 0));
            ctx.strokeStyle = i % 3 === 0 ? "#ff6470" : "#8fe6ff";
            ctx.lineWidth = i % 3 === 0 ? 3.2 : 1.4;
            ctx.beginPath();
            ctx.moveTo(Math.cos(a) * inner, Math.sin(a) * inner);
            ctx.lineTo(Math.cos(a) * outer, Math.sin(a) * outer);
            ctx.stroke();
          }
          ctx.restore();
        }

        function drawHorrorScanSweep(charge, collapse, fade) {
          const amount = (charge * 0.14 + collapse * 0.26) * fade;
          if (amount <= 0.01) return;
          const floorY = CENTER_Y + 88;
          const sweep = ((state.time * 0.065) % 760) - 380;
          ctx.save();
          ctx.globalCompositeOperation = "screen";
          ctx.translate(CENTER_X, floorY);
          ctx.scale(1, 0.36);
          const gradient = ctx.createLinearGradient(sweep - 90, 0, sweep + 90, 0);
          gradient.addColorStop(0, "rgba(126,240,255,0)");
          gradient.addColorStop(0.45, `rgba(126,240,255,${amount * 0.34})`);
          gradient.addColorStop(0.5, `rgba(255,92,106,${amount * 0.28})`);
          gradient.addColorStop(1, "rgba(126,240,255,0)");
          ctx.fillStyle = gradient;
          ctx.beginPath();
          ctx.ellipse(0, 0, 390, 390, 0, 0, TAU);
          ctx.clip();
          ctx.fillRect(sweep - 110, -395, 220, 790);
          ctx.restore();
        }

        function drawHorrorWarningNodes(charge, collapse, alarm, fade) {
          const intensity = (charge * 0.24 + collapse * 0.36 + alarm * 0.4) * fade;
          if (intensity <= 0.01) return;
          const floorY = CENTER_Y + 88;
          const blink = Math.floor(state.time / 135) % 2 === 0 ? 1 : 0.35;
          ctx.save();
          ctx.globalCompositeOperation = "lighter";
          for (let i = 0; i < 10; i += 1) {
            const a = i / 10 * TAU + state.time * 0.00045;
            const x = CENTER_X + Math.cos(a) * 348;
            const y = floorY + Math.sin(a) * 118;
            const r = i % 2 === 0 ? 6 : 4;
            ctx.globalAlpha = intensity * (i % 3 === 0 ? blink : 0.62);
            ctx.fillStyle = i % 3 === 0 ? "#ff4658" : "#7ef0ff";
            ctx.fillRect(x - r, y - r * 0.55, r * 2, r * 1.1);
            ctx.beginPath();
            ctx.arc(x, y, r * (2.2 + alarm * 1.2), 0, TAU);
            ctx.strokeStyle = i % 3 === 0 ? "rgba(255,70,88,0.5)" : "rgba(126,240,255,0.42)";
            ctx.lineWidth = 1.4;
            ctx.stroke();
          }
          ctx.restore();
        }

        function drawHorrorSparkNeedles(collapse, alarm, fade) {
          const amount = (collapse * 0.55 + alarm * 0.35) * fade;
          if (amount <= 0.01) return;
          ctx.save();
          ctx.globalCompositeOperation = "lighter";
          for (let i = 0; i < 34; i += 1) {
            const seed = i * 19.37;
            const drift = state.time * (0.0017 + (i % 5) * 0.0002);
            const a = seed + drift;
            const radius = 95 + ((i * 41 + state.time * 0.055) % 320);
            const x = CENTER_X + Math.cos(a) * radius * 0.92;
            const y = CENTER_Y + 42 + Math.sin(a) * radius * 0.34;
            const len = 9 + (i % 4) * 5 + alarm * 12;
            ctx.globalAlpha = amount * (0.2 + (i % 5) * 0.07);
            ctx.strokeStyle = i % 4 === 0 ? "#ff6a32" : i % 3 === 0 ? "#ff5066" : "#82efff";
            ctx.lineWidth = i % 4 === 0 ? 2.2 : 1.2;
            ctx.beginPath();
            ctx.moveTo(x - Math.cos(a) * len, y - Math.sin(a) * len * 0.45);
            ctx.lineTo(x + Math.cos(a) * len, y + Math.sin(a) * len * 0.45);
            ctx.stroke();
          }
          ctx.restore();
        }

        function drawHeaderText() {
          const header = headerCopy();
          const flash = state.phase === "reveal" ? Math.sin(state.time * 0.055) * 0.5 + 0.5 : 0;
          ctx.save();
          ctx.textAlign = "center";
          if (!textFlourishReady()) {
            ctx.fillStyle = "rgba(0,0,0,0.34)";
            ctx.fillRect(395, 72, 810, 78);
            ctx.strokeStyle = state.reality === "horror" ? "rgba(255,100,110,0.4)" : "rgba(255,211,106,0.35)";
            ctx.strokeRect(395.5, 72.5, 810, 78);
          }
          ctx.fillStyle = flash > 0.2 ? "#ffffff" : "rgba(247,239,226,0.74)";
          ctx.shadowColor = state.reality === "horror" ? "rgba(0,0,0,0.95)" : "rgba(49,31,12,0.72)";
          ctx.shadowBlur = state.reality === "horror" ? 14 : 9;
          ctx.shadowOffsetY = 3;
          drawFittedText(header.title, state.reality === "horror" ? 795 : CENTER_X, state.reality === "horror" ? 129 : 125, 520, {
            maxSize: state.reality === "horror" ? 44 : 42,
            minSize: 30,
            weight: 800,
            visualCenter: state.reality === "horror",
          });
          ctx.restore();
        }

        function drawTextPanelFlourishes() {
          const flourish = currentTextFlourish();
          if (!flourish || !flourish.complete || flourish.naturalWidth === 0) return;
          const specs = state.reality === "horror"
            ? [
                { sx: 230, sy: 42, sw: 1125, sh: 260, dx: 395, dy: 58, dw: 810, dh: 126 },
                { sx: 230, sy: 690, sw: 1125, sh: 270, dx: 385, dy: 798, dw: 830, dh: 146 },
              ]
            : [
                { sx: 145, sy: 55, sw: 1305, sh: 285, dx: 368, dy: 56, dw: 864, dh: 150 },
                { sx: 145, sy: 680, sw: 1305, sh: 280, dx: 370, dy: 786, dw: 860, dh: 160 },
              ];
          ctx.save();
          ctx.globalAlpha = state.reality === "horror" ? 0.96 : 0.98;
          specs.forEach((spec) => {
            ctx.drawImage(flourish, spec.sx, spec.sy, spec.sw, spec.sh, spec.dx, spec.dy, spec.dw, spec.dh);
          });
          ctx.restore();
        }

        function drawSourceItems() {
          const assets = currentAssets();
          const positions = [-330, 0, 330];
          const merge = smoothstep(1850, 4200, state.time);
          const resonance = smoothstep(900, 2600, state.time) * (1 - smoothstep(3600, 4550, state.time));
          const hide = smoothstep(3950, 4650, state.time);
          const pulse = Math.sin(state.time * 0.015) * 0.5 + 0.5;
          const jitter = state.drama * resonance * 7;
          const demo = currentDemo();
          const horrorAnimalScale = state.reality === "horror" && demo.horrorSourceScale;
          const demoScale = (demo.sourceScale || 1) * (state.reality === "horror" ? demo.horrorSourceScale || 1 : 1);
          const mergeShrink = horrorAnimalScale ? 0.2 : 0.34;

          positions.forEach((offset, index) => {
            const towardCenter = easeInOutSine(merge);
            const x = CENTER_X + offset * (1 - towardCenter) + Math.sin(state.time * 0.014 + index) * jitter;
            const y = CENTER_Y + 82 - Math.sin(index + state.time * 0.006) * 18 * resonance;
            const scale = 1 - mergeShrink * merge + pulse * 0.045 * resonance;
            const alpha = 1 - hide;
            const rotation = (index - 1) * 0.08 * resonance + Math.sin(state.time * 0.011 + index) * 0.05 * resonance;

            drawPedestal(x, y + 120, 150 * scale, alpha);
            drawRings(x, y, 102 * scale, resonance, index);
            drawSprite(imageFor(assets.sources[index]), x, y, 190 * scale * demoScale, 190 * scale * demoScale, {
              alpha,
              rotation,
              glow: resonance * (0.55 + state.drama * 0.45),
              silhouette: false,
            });
          });
        }

        function drawPedestal(x, y, radius, alpha) {
          ctx.save();
          ctx.globalAlpha = alpha * 0.75;
          ctx.translate(x, y);
          ctx.scale(1, 0.23);
          const gradient = ctx.createRadialGradient(0, 0, 5, 0, 0, radius);
          gradient.addColorStop(0, state.reality === "horror" ? "rgba(255,100,110,0.45)" : "rgba(255,211,106,0.44)");
          gradient.addColorStop(1, "rgba(0,0,0,0)");
          ctx.fillStyle = gradient;
          ctx.beginPath();
          ctx.arc(0, 0, radius, 0, TAU);
          ctx.fill();
          ctx.restore();
        }

        function drawRings(x, y, radius, amount, index) {
          if (amount <= 0.01) return;
          ctx.save();
          ctx.globalAlpha = amount * 0.65;
          ctx.strokeStyle = state.reality === "horror" ? "#ff646e" : "#ffd36a";
          ctx.lineWidth = 2;
          for (let i = 0; i < 3; i += 1) {
            const r = radius + ((state.time * 0.075 + i * 36 + index * 14) % 108);
            ctx.globalAlpha = amount * (1 - (r - radius) / 116) * 0.5;
            ctx.beginPath();
            ctx.arc(x, y + 24, r, 0, TAU);
            ctx.stroke();
          }
          ctx.restore();
        }

        function drawBeams() {
          const amount = smoothstep(2250, 4550, state.time) * (1 - smoothstep(5350, 6100, state.time));
          if (amount <= 0.01) return;
          const positions = [-330, 0, 330];
          ctx.save();
          ctx.globalCompositeOperation = "lighter";
          positions.forEach((offset, index) => {
            const merge = smoothstep(1850, 4200, state.time);
            const x = CENTER_X + offset * (1 - easeInOutSine(merge));
            const y = CENTER_Y + 82;
            const beam = ctx.createLinearGradient(x, y, CENTER_X, CENTER_Y);
            const color = state.reality === "horror" ? "255,100,110" : "255,211,106";
            beam.addColorStop(0, `rgba(${color},0)`);
            beam.addColorStop(0.45, `rgba(${color},${0.22 * amount})`);
            beam.addColorStop(1, `rgba(255,255,255,${0.52 * amount})`);
            ctx.strokeStyle = beam;
            ctx.lineWidth = 15 + Math.sin(state.time * 0.021 + index) * 5 + state.drama * 12;
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.quadraticCurveTo((x + CENTER_X) / 2, y - 160 - index * 18, CENTER_X, CENTER_Y);
            ctx.stroke();
          });
          ctx.restore();
        }

        function drawCore() {
          const charge = smoothstep(2350, 5150, state.time);
          const fade = 1 - smoothstep(6450, 7150, state.time);
          if (charge <= 0.01 || fade <= 0.01) return;
          const pulse = Math.sin(state.time * 0.022) * 0.5 + 0.5;
          const radiusScale = state.reality === "horror" ? 0.78 : 1;
          const radius = (58 + charge * 142 + pulse * 28 * state.drama) * radiusScale;
          ctx.save();
          ctx.globalCompositeOperation = "lighter";
          const gradient = ctx.createRadialGradient(CENTER_X, CENTER_Y, 0, CENTER_X, CENTER_Y, radius);
          gradient.addColorStop(0, state.reality === "horror" ? `rgba(255,245,245,${0.4 * fade})` : `rgba(255,255,255,${0.92 * fade})`);
          gradient.addColorStop(0.28, state.reality === "horror" ? `rgba(255,100,110,${0.42 * fade})` : `rgba(255,211,106,${0.5 * fade})`);
          gradient.addColorStop(1, "rgba(255,255,255,0)");
          ctx.fillStyle = gradient;
          ctx.beginPath();
          ctx.arc(CENTER_X, CENTER_Y, radius, 0, TAU);
          ctx.fill();

          ctx.strokeStyle = state.reality === "horror" ? `rgba(138,199,255,${0.45 * fade})` : `rgba(155,241,199,${0.42 * fade})`;
          ctx.lineWidth = state.reality === "horror" ? 3.2 : 5;
          for (let i = 0; i < 5; i += 1) {
            ctx.beginPath();
            ctx.arc(CENTER_X, CENTER_Y, radius * (0.55 + i * 0.17) + Math.sin(state.time * 0.013 + i) * 20, 0, TAU);
            ctx.stroke();
          }
          ctx.restore();
        }

        function drawResult() {
          const assets = currentAssets();
          const silhouetteAmount = smoothstep(4300, 5200, state.time) * (1 - smoothstep(5600, 6150, state.time));
          const reveal = smoothstep(5600, 6500, state.time);
          const settle = smoothstep(6500, 7150, state.time);
          const visible = silhouetteAmount + reveal;
          if (visible <= 0.01) return;

          const pulse = Math.sin(state.time * 0.018) * 0.5 + 0.5;
          const demo = currentDemo();
          const demoScale = (demo.resultScale || 1) * (state.reality === "horror" ? demo.horrorResultScale || 1 : 1);
          const size = (280 + silhouetteAmount * 180 + reveal * 115 - settle * 60 + pulse * 24 * (silhouetteAmount + reveal)) * demoScale;
          const breathe = resultBreathValue();
          const breatheScaleX = 1 + breathe * 0.016;
          const breatheScaleY = 1 - breathe * 0.032;
          const y = CENTER_Y - 12 - reveal * 34 + settle * 20 + breathe * 6;
          const shouldInvert = silhouetteAmount > 0.1 && Math.floor(state.time / (145 - state.drama * 70)) % 2 === 0;

          if (silhouetteAmount > 0.05) {
            drawSprite(imageFor(assets.result), CENTER_X, y, size, size, {
              alpha: clamp(silhouetteAmount + reveal, 0, 1),
              glow: 1,
              silhouette: true,
              invert: shouldInvert,
              rotation: Math.sin(state.time * 0.01) * 0.035 * silhouetteAmount,
            });
          }

          if (reveal > 0.02) {
            drawSprite(imageFor(assets.result), CENTER_X, y, size * (0.94 + settle * 0.08), size * (0.94 + settle * 0.08), {
              alpha: reveal,
              glow: 1 - settle * 0.45,
              silhouette: false,
              scaleX: breatheScaleX,
              scaleY: breatheScaleY,
              rotation: Math.sin(state.time * 0.008) * 0.015 * (1 - settle),
            });
          }
        }

        function drawSprite(img, x, y, maxW, maxH, options = {}) {
          if (!img || !img.complete || img.naturalWidth === 0) {
            drawMissingSprite(x, y, maxW, maxH, options.alpha ?? 1);
            return;
          }
          const alpha = options.alpha ?? 1;
          const scale = Math.min(maxW / img.naturalWidth, maxH / img.naturalHeight);
          const w = img.naturalWidth * scale;
          const h = img.naturalHeight * scale;

          ctx.save();
          ctx.translate(x, y);
          ctx.rotate(options.rotation || 0);
          ctx.scale(options.scaleX || 1, options.scaleY || 1);
          ctx.globalAlpha = alpha;

          if (options.glow) {
            ctx.save();
            ctx.globalCompositeOperation = "lighter";
            ctx.shadowColor = state.reality === "horror" ? "#ff646e" : "#ffd36a";
            ctx.shadowBlur = 35 + options.glow * 55;
            ctx.globalAlpha = alpha * options.glow * 0.42;
            ctx.drawImage(img, -w / 2, -h / 2, w, h);
            ctx.restore();
          }

          if (options.silhouette) {
            ctx.save();
            ctx.filter = options.invert
              ? "brightness(0) invert(1) drop-shadow(0 0 35px rgba(255,255,255,0.88))"
              : "brightness(0) drop-shadow(0 0 30px rgba(255,255,255,0.75))";
            ctx.drawImage(img, -w / 2, -h / 2, w, h);
            ctx.restore();
          } else {
            ctx.drawImage(img, -w / 2, -h / 2, w, h);
          }

          ctx.restore();
        }

        function drawMissingSprite(x, y, w, h, alpha) {
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.translate(x, y);
          ctx.fillStyle = "rgba(255,255,255,0.12)";
          ctx.strokeStyle = "rgba(255,255,255,0.45)";
          ctx.lineWidth = 3;
          ctx.fillRect(-w / 2, -h / 2, w, h);
          ctx.strokeRect(-w / 2, -h / 2, w, h);
          ctx.restore();
        }

        function drawParticles() {
          ctx.save();
          ctx.globalCompositeOperation = "lighter";
          state.particles.forEach((particle) => {
            const age = particle.age / particle.life;
            const alpha = Math.pow(1 - age, 1.4);
            ctx.globalAlpha = alpha;
            ctx.fillStyle = particle.color;
            if (particle.kind === "shard") {
              ctx.save();
              ctx.translate(particle.x, particle.y);
              ctx.rotate(age * TAU + particle.vx * 0.002);
              ctx.fillRect(-particle.r * 0.35, -particle.r * 1.2, particle.r * 0.7, particle.r * 2.4);
              ctx.restore();
            } else {
              ctx.beginPath();
              ctx.arc(particle.x, particle.y, particle.r * (1 - age * 0.45), 0, TAU);
              ctx.fill();
            }
          });
          ctx.restore();
        }

        function drawFlashAndGlitch() {
          const revealFlash = smoothstep(5600, 5750, state.time) * (1 - smoothstep(6000, 6500, state.time));
          const mergeFlash = smoothstep(3900, 4200, state.time) * (1 - smoothstep(4200, 4520, state.time));
          const flashScale = state.reality === "horror" ? 0.22 : 1;
          const flash = Math.max(revealFlash, mergeFlash * 0.34) * (0.6 + state.drama * 0.36) * flashScale;
          if (flash > 0.01) {
            ctx.save();
            ctx.globalCompositeOperation = "screen";
            ctx.fillStyle = `rgba(255,255,255,${flash})`;
            ctx.fillRect(0, 0, WIDTH, HEIGHT);
            ctx.restore();
          }

          if (state.reality === "horror" && state.time > 3100 && state.time < 6400) {
            ctx.save();
            ctx.globalAlpha = 0.035 + state.drama * 0.035;
            for (let i = 0; i < 12; i += 1) {
              const y = (i * 91 + state.time * 0.1) % HEIGHT;
              const h = 1 + ((i * 5) % 4);
              ctx.fillStyle = i % 2 ? "#ff646e" : "#8fe6ff";
              const offset = (Math.sin(state.time * 0.012 + i) * 28) | 0;
              const width = WIDTH * (0.28 + (i % 4) * 0.16);
              ctx.fillRect(offset + (i % 3) * 230, y, width, h);
            }
            ctx.restore();
          }
        }

        function drawCaptions() {
          const demo = currentDemo();
          const copy = displayCopy(demo);
          const reveal = smoothstep(5850, 6750, state.time);
          const label = state.phase === "settle" || state.phase === "reveal" ? copy.result : copy.name;

          ctx.save();
          ctx.textAlign = "center";
          if (!textFlourishReady()) {
            ctx.fillStyle = "rgba(0,0,0,0.42)";
            ctx.fillRect(430, 828, 740, 98);
            ctx.strokeStyle = state.reality === "horror" ? "rgba(255,100,110,0.45)" : "rgba(255,211,106,0.38)";
            ctx.strokeRect(430.5, 828.5, 740, 98);
          }

          ctx.fillStyle = reveal > 0.35 ? "#ffffff" : "rgba(247,239,226,0.82)";
          ctx.shadowColor = state.reality === "horror" ? "rgba(0,0,0,0.95)" : "rgba(42,28,13,0.72)";
          ctx.shadowBlur = state.reality === "horror" ? 14 : 9;
          ctx.shadowOffsetY = 3;
          drawFittedTextBlock(label, CENTER_X, state.reality === "horror" ? 862 : 867, 530, {
            maxSize: state.reality === "horror" ? 36 : 34,
            minSize: 18,
            maxLines: 2,
            weight: 800,
          });
          ctx.restore();
        }

        function render() {
          clearStage();
          drawStageFloor();
          drawEnvironmentFx();

          if (!state.assetsLoaded) {
            ctx.save();
            ctx.textAlign = "center";
            ctx.fillStyle = "#fff";
            ctx.font = "800 42px Inter, sans-serif";
            ctx.fillText("Loading merge assets", CENTER_X, CENTER_Y);
            ctx.restore();
            return;
          }

          drawBeams();
          drawSourceItems();
          drawCore();
          drawResult();
          drawParticles();
          drawFlashAndGlitch();
          drawTextPanelFlourishes();
          drawHeaderText();
          drawCaptions();

          const demo = currentDemo();
          const copy = displayCopy(demo);
          const statusName = state.phase === "settle" || state.phase === "reveal" ? copy.result : copy.name;
          statusText.textContent = `${statusName} - ${phaseLabel()} ${Math.round(state.time / DURATION * 100)}%`;
        }

        function tick(now) {
          const dt = Math.min(50, now - state.lastFrameAt);
          state.lastFrameAt = now;
          update(dt);
          render();
          requestAnimationFrame(tick);
        }

        window.advanceTime = (ms) => {
          const steps = Math.max(1, Math.round(ms / (1000 / 60)));
          const dt = ms / steps;
          for (let i = 0; i < steps; i += 1) {
            update(dt);
          }
          render();
        };

        window.render_game_to_text = () => {
          const demo = currentDemo();
          const copy = displayCopy(demo);
          return JSON.stringify({
            note: "Canvas coordinates use origin at top-left, x right, y down.",
            route: "merge-cutscene-prototype",
            demo: state.demoKey,
            kind: demo.kind,
            item: copy.name,
            result: copy.result,
            reality: state.reality,
            phase: state.phase,
            timeMs: Math.round(state.time),
            idleTimeMs: Math.round(state.idleTime),
            durationMs: DURATION,
            progress: Number((state.time / DURATION).toFixed(3)),
            drama: Number(state.drama.toFixed(2)),
            running: state.running,
            resultBreath: Number(resultBreathValue().toFixed(4)),
            assetsLoaded: state.assetsLoaded,
            textFlourishLoaded: textFlourishReady(),
            audio: {
              enabled: audioState.enabled,
              blocked: audioState.blocked,
              cue: audioState.activeCue,
              src: audioState.activeSrc,
              payoffMs: MUSIC_PAYOFF_MS,
            },
            imageErrors: state.imageErrors.slice(0, 5),
            visibleCopies: state.phase === "lineup" || state.phase === "resonance" || state.phase === "merge" ? 3 : 0,
            revealVisible: state.phase === "silhouette" || state.phase === "reveal" || state.phase === "settle",
            particleCount: state.particles.length,
          });
        };

        replayButton.addEventListener("click", restart);
        musicButton.addEventListener("click", toggleMusic);
        realityButton.addEventListener("click", toggleReality);
        closeButton.addEventListener("click", () => {
          closeButton.blur();
        });
        dramaRange.addEventListener("input", () => {
          state.drama = Number(dramaRange.value) / 100;
          render();
        });
        demoButtons.forEach((button) => {
          button.addEventListener("click", () => setDemo(button.dataset.demo));
        });
        window.addEventListener("keydown", (event) => {
          if (event.key === " ") {
            event.preventDefault();
            restart();
          } else if (event.key.toLowerCase() === "m") {
            toggleMusic();
          } else if (event.key === "1") {
            setDemo("animal");
          } else if (event.key === "2") {
            setDemo("topping");
          } else if (event.key === "3") {
            setDemo("drink");
          } else if (event.key.toLowerCase() === "h") {
            toggleReality();
          } else if (event.key === "ArrowRight" || event.key === "ArrowUp") {
            dramaRange.value = String(Math.min(100, Number(dramaRange.value) + 5));
            dramaRange.dispatchEvent(new Event("input"));
          } else if (event.key === "ArrowLeft" || event.key === "ArrowDown") {
            dramaRange.value = String(Math.max(0, Number(dramaRange.value) - 5));
            dramaRange.dispatchEvent(new Event("input"));
          }
        });

        preload();
        updateMusicButton();
        restart();
        requestAnimationFrame(tick);
      })();
    </script>
  </body>
</html>
