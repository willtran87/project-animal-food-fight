<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Harvest Friends - Start Menu</title>
    <link rel="icon" type="image/png" sizes="192x192" href="assets/favicon-192.png" />
    <link rel="preload" as="image" href="assets/start-menu/cozy-picnic-start-bg-v1.webp" />
    <link rel="preload" as="image" href="assets/start-menu/run-mode-selector-cozy-bg-v1.webp" />
    <link rel="preload" as="image" href="assets/start-menu/run-mode-selector-horror-bg-v1.webp" />
    <link rel="preload" as="image" href="assets/start-menu/harvest-friends-title-v2.webp" />
    <link rel="preload" as="image" href="assets/start-menu/harvest-friends-mascot-cluster-v1.webp" />
    <link rel="stylesheet" href="styles/start-menu.css?v=field-guide-panzoom-1-campaign-flow-1-root-frame-2-no-lr-mask-1-hidden-action-1-final-reboot-static-2-menu-theme-options-1-postgame-horror-lock-1-horror-spec-mascot-hide-1-run-mode-select-6-menu-enter-motion-2" />
    <style>
      body[data-campaign-screen="opening"][data-campaign-frame-ready="true"] .start-menu,
      body[data-campaign-screen="game"][data-campaign-frame-ready="true"] .start-menu {
        z-index: 45;
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transform: scale(1.018);
        filter: blur(2.5px);
        transition:
          opacity 880ms cubic-bezier(0.2, 0.72, 0.22, 1),
          transform 960ms cubic-bezier(0.16, 0.84, 0.28, 1),
          filter 880ms ease,
          visibility 0s linear 980ms;
      }

      .campaign-frame {
        position: fixed;
        inset: 0;
        z-index: 40;
        width: 100vw;
        height: 100vh;
        border: 0;
        background: #dfeee5;
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transition:
          opacity 920ms cubic-bezier(0.16, 0.84, 0.28, 1),
          visibility 0s linear 920ms;
      }

      .campaign-frame[hidden] {
        display: block;
      }

      body[data-campaign-screen="opening"] .campaign-frame,
      body[data-campaign-screen="game"] .campaign-frame {
        visibility: visible;
      }

      body[data-campaign-frame-ready="true"] .campaign-frame {
        opacity: 1;
        pointer-events: auto;
        transition:
          opacity 920ms 120ms cubic-bezier(0.16, 0.84, 0.28, 1),
          visibility 0s;
      }

      body[data-campaign-shell="root"] .start-transition.is-entering-run {
        opacity: 1;
        transform: scale(1);
        filter: none;
        animation: root-table-handoff-wait 1200ms ease-in-out both;
      }

      body[data-campaign-shell="root"] .start-transition.is-entering-run::before {
        opacity: 1;
        animation: root-table-warmth-wait 1200ms ease-in-out both;
      }

      body[data-campaign-shell="root"] .start-transition.is-entering-run::after {
        opacity: 0.72;
        transform: scale(1);
        animation: root-table-bloom-wait 1200ms ease-in-out both;
      }

      body[data-campaign-shell="root"] .start-transition.is-entering-run .start-transition-card {
        opacity: 1;
        transform: translateY(0) scale(1);
        animation: root-table-message-wait 1200ms ease-in-out both;
      }

      body[data-campaign-shell="root"][data-campaign-frame-ready="true"] .start-transition.is-entering-run {
        animation: root-table-handoff-exit 920ms cubic-bezier(0.28, 0, 0.18, 1) both;
      }

      body[data-campaign-shell="root"][data-campaign-frame-ready="true"] .start-transition.is-entering-run::before {
        animation: root-table-warmth-exit 920ms ease-in both;
      }

      body[data-campaign-shell="root"][data-campaign-frame-ready="true"] .start-transition.is-entering-run::after {
        animation: root-table-bloom-exit 920ms ease-in both;
      }

      body[data-campaign-shell="root"][data-campaign-frame-ready="true"] .start-transition.is-entering-run .start-transition-card {
        animation: root-table-message-exit 760ms cubic-bezier(0.28, 0, 0.18, 1) both;
      }

      @keyframes root-table-handoff-wait {
        0%,
        100% {
          opacity: 1;
          filter: saturate(1) brightness(1);
          transform: scale(1);
        }

        50% {
          opacity: 1;
          filter: saturate(1.03) brightness(1.035);
          transform: scale(1.004);
        }
      }

      @keyframes root-table-warmth-wait {
        0%,
        100% {
          opacity: 1;
        }

        50% {
          opacity: 0.86;
        }
      }

      @keyframes root-table-bloom-wait {
        0%,
        100% {
          opacity: 0.62;
          transform: scale(1.05);
        }

        50% {
          opacity: 0.82;
          transform: scale(1.2);
        }
      }

      @keyframes root-table-message-wait {
        0%,
        100% {
          opacity: 1;
          transform: translateY(0) scale(1);
        }

        50% {
          opacity: 0.96;
          transform: translateY(-2px) scale(1.004);
        }
      }

      @keyframes root-table-handoff-exit {
        0% {
          opacity: 1;
          filter: saturate(1.02) brightness(1.04);
          transform: scale(1);
        }

        48% {
          opacity: 0.86;
          filter: saturate(1.08) brightness(1.16);
          transform: scale(1.018);
        }

        100% {
          opacity: 0;
          filter: saturate(0.9) brightness(1.32) blur(2px);
          transform: scale(1.045);
        }
      }

      @keyframes root-table-warmth-exit {
        0% {
          opacity: 1;
        }

        100% {
          opacity: 0.1;
        }
      }

      @keyframes root-table-bloom-exit {
        0% {
          opacity: 0.76;
          transform: scale(1.1);
        }

        65% {
          opacity: 0.72;
          transform: scale(1.9);
        }

        100% {
          opacity: 0;
          transform: scale(2.8);
        }
      }

      @keyframes root-table-message-exit {
        0% {
          opacity: 1;
          transform: translateY(0) scale(1);
        }

        44% {
          opacity: 0.78;
          transform: translateY(-5px) scale(1.012);
        }

        100% {
          opacity: 0;
          transform: translateY(-22px) scale(0.97);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        body[data-campaign-screen="opening"][data-campaign-frame-ready="true"] .start-menu,
        body[data-campaign-screen="game"][data-campaign-frame-ready="true"] .start-menu,
        .campaign-frame {
          transition: none;
          transform: none;
          filter: none;
        }

        body[data-campaign-shell="root"] .start-transition.is-entering-run,
        body[data-campaign-shell="root"] .start-transition.is-entering-run::before,
        body[data-campaign-shell="root"] .start-transition.is-entering-run::after,
        body[data-campaign-shell="root"] .start-transition.is-entering-run .start-transition-card {
          animation: none;
        }
      }
    </style>
  </head>
  <body data-campaign-shell="root">
    <main class="start-menu" aria-label="Harvest Friends start menu">
      <div class="food-lob-layer" aria-hidden="true"></div>
      <div class="horror-illusion-bleed" aria-hidden="true"></div>
      <div class="horror-static-layer" aria-hidden="true"></div>
      <img
        class="horror-overhead-layer"
        src="assets/start-menu/runtime/horror-overhead-cables-v1.webp"
        alt=""
        aria-hidden="true"
      />
      <img
        class="horror-relic-layer"
        src="assets/start-menu/runtime/horror-broken-relics-v1.webp"
        alt=""
        aria-hidden="true"
      />
      <img
        class="mascot-cluster"
        src="assets/start-menu/harvest-friends-mascot-cluster-v1.webp"
        alt=""
        aria-hidden="true"
      />
      <section class="menu-stage" aria-live="polite">
        <div class="brand-lockup">
          <h1>
            <img
              class="title-logo"
              src="assets/start-menu/harvest-friends-title-v2.webp"
              alt="Harvest Friends"
            />
            <span class="horror-title" aria-hidden="true">Harvest Friends</span>
          </h1>
        </div>

        <nav class="primary-menu" aria-label="Main menu">
          <button class="menu-action continue-run-action" type="button" data-action="continue" hidden>
            <span class="button-label">Continue Run</span>
          </button>
          <button class="menu-action is-selected" type="button" data-action="start">
            <span class="button-label">Start Run</span>
          </button>
          <button class="menu-action" type="button" data-action="fieldGuide">
            <span class="button-label">Field Guide</span>
          </button>
          <button class="menu-action" type="button" data-action="options">
            <span class="button-label">Options</span>
          </button>
        </nav>

        <section class="run-mode-panel" aria-label="Choose run mode" hidden>
          <button class="run-mode-choice is-selected" type="button" data-run-mode="story">
            <span class="run-mode-title">Story Mode</span>
            <span class="run-mode-copy">Guided run with a beginning and finale</span>
          </button>
          <button class="run-mode-choice" type="button" data-run-mode="infinite">
            <span class="run-mode-title">Infinite Mode</span>
            <span class="run-mode-copy">Endless pressure tests, no story</span>
          </button>
        </section>

        <aside class="options-panel" aria-label="Options" hidden>
          <div class="option-row option-row-theme">
            <span class="option-label" id="menu-theme-label">Menu</span>
            <div class="theme-segmented" role="radiogroup" aria-labelledby="menu-theme-label">
              <button class="theme-choice" type="button" role="radio" data-menu-theme-option="cozy">
                Cozy
              </button>
              <button class="theme-choice" type="button" role="radio" data-menu-theme-option="horror">
                Horror
              </button>
            </div>
          </div>
          <div class="option-row">
            <label for="music-volume">Music</label>
            <input id="music-volume" type="range" min="0" max="10" value="7" />
          </div>
          <div class="option-row option-row-select">
            <label for="music-track">Tune</label>
            <select id="music-track" aria-label="Music selection">
              <option value="market">Sunny Market</option>
              <option value="prep">Prep Counter</option>
              <option value="battle">Picnic Skirmish</option>
              <option value="victory">Little Victory</option>
              <option value="defeat">Soft Defeat</option>
              <option value="horror-market">Ruined Market</option>
              <option value="horror-prep">Cold Prep Table</option>
              <option value="horror-battle">Midnight Skirmish</option>
              <option value="horror-victory">False Victory</option>
              <option value="horror-defeat">Last Defeat</option>
            </select>
          </div>
          <div class="option-row">
            <label for="sfx-volume">SFX</label>
            <input id="sfx-volume" type="range" min="0" max="10" value="8" />
          </div>
          <button class="purge-game-data" type="button" data-action="purgeGameData">
            Purge Game Data
          </button>
        </aside>
      </section>

      <section class="field-guide" aria-label="Food Animal Field Guide" hidden>
        <div class="field-guide-shell">
          <header class="field-guide-header">
            <button class="field-guide-icon-button" type="button" data-guide-action="close" aria-label="Close field guide">
              <img class="field-guide-control-icon" src="assets/start-menu/runtime/field-guide-icon-close-v1.webp" alt="" aria-hidden="true" />
            </button>
          </header>

          <div class="field-guide-book" aria-live="polite">
            <button class="field-guide-nav field-guide-nav-prev" type="button" data-guide-action="prev" aria-label="Previous page">
              <img class="field-guide-control-icon" src="assets/start-menu/runtime/field-guide-icon-prev-v1.webp" alt="" aria-hidden="true" />
            </button>
            <figure class="field-guide-page">
              <div class="field-guide-page-art">
                <div class="field-guide-page-viewport">
                  <img class="field-guide-page-image" alt="" />
                </div>
              </div>
            </figure>
            <button class="field-guide-nav field-guide-nav-next" type="button" data-guide-action="next" aria-label="Next page">
              <img class="field-guide-control-icon" src="assets/start-menu/runtime/field-guide-icon-next-v1.webp" alt="" aria-hidden="true" />
            </button>
          </div>

          <footer class="field-guide-footer">
            <div class="field-guide-page-title"></div>
            <div class="field-guide-page-count"></div>
          </footer>
        </div>
      </section>

      <section class="start-transition" aria-label="Starting game" hidden>
        <div class="start-transition-card">
          <div class="start-transition-plate" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <img
            class="start-transition-message"
            src="assets/start-menu/start-transition-message-v1.webp"
            alt="Setting the table..."
          />
          <img
            class="horror-transition-plaque"
            src="assets/start-menu/runtime/horror-transition-plaque-v1.webp"
            alt=""
            aria-hidden="true"
          />
          <span class="start-transition-copy horror-transition-copy">Opening the breach...</span>
        </div>
      </section>
    </main>
    <iframe class="campaign-frame" title="Harvest Friends campaign" hidden></iframe>
    <div class="menu-reboot-static-overlay" aria-hidden="true" hidden></div>
    <div class="menu-load-transition-overlay" aria-hidden="true" hidden></div>
    <script src="src/app-scripts.js?v=h-68f269ada80a" data-entry="start-menu"></script>
  </body>
</html>
